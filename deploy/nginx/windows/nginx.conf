            proxy_pass http://sven_gateway_api/healthz;
        }

        location = /readyz {
            default_type application/json;
            return 200 '{"status":"ok","source":"nginx-edge"}';
        }

        location = /manifest.json {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://sven_canvas_ui/manifest.json;
