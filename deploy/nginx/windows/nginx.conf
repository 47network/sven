worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    error_log logs/error.log info;
    sendfile      on;
    keepalive_timeout  65;
    server_names_hash_bucket_size 64;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    limit_req_zone $binary_remote_addr zone=install_rl:10m rate=30r/m;

    upstream sven_gateway_api {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    upstream sven_admin_ui {
        server 127.0.0.1:3100;
        keepalive 16;
    }

    upstream sven_canvas_ui {
        server 127.0.0.1:3200;
        keepalive 16;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name sven.47matrix.online sven.glyph.47matrix.online sven.systems app.sven.systems admin.sven.systems;

        location ^~ /.well-known/acme-challenge/ {
            root acme-challenge;
            default_type text/plain;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host:44747$request_uri;
        }
    }

    server {
        listen 44747 ssl;
        listen [::]:44747 ssl;
        http2 on;
        server_name sven.47matrix.online;
        server_tokens off;

        ssl_certificate     certs/sven.47matrix.online/fullchain.pem;
        ssl_certificate_key certs/sven.47matrix.online/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        root ../../quickstart;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location = /suite {
            try_files /suite/index.html =404;
        }

        location = /suite/ {
            try_files /suite/index.html =404;
        }

        location ~ ^/suite/(platform|features|security|docs|enterprise|roadmap)$ {
            try_files /suite/$1.html =404;
        }

        location ^~ /suite/assets/ {
            try_files $uri =404;
        }

        location = /install.sh {
            default_type text/plain;
            limit_req zone=install_rl burst=20 nodelay;
            try_files /install.sh =404;
        }

        location = /install.ps1 {
            default_type text/plain;
            limit_req zone=install_rl burst=20 nodelay;
            try_files /install.ps1 =404;
        }

        location = /install.cmd {
            default_type text/plain;
            limit_req zone=install_rl burst=20 nodelay;
            try_files /install.cmd =404;
        }

        location ^~ /v1/public/community/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_gateway_api;
        }

        location = /community {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/community;
        }

        location ^~ /community/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/community/;
        }

        location ^~ /_next/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/_next/;
        }

        location = /manifest.json {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/manifest.json;
        }

        location = /icon-192.png {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/icon-192.png;
        }

        location = /icon-512.png {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/icon-512.png;
        }

        location = /sw.js {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/sw.js;
        }

        location ^~ /docs {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui;
        }

        location ^~ /marketplace {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui;
        }

        location ~ ^/(login|privacy|terms)$ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui;
        }

        location = /admin {
            return 302 https://sven.glyph.47matrix.online:44747/admin47;
        }

        location = /admin47 {
            return 302 https://sven.glyph.47matrix.online:44747/admin47;
        }

        location ^~ /api/v1/ {
            add_header X-Sven-Route api-v1-proxy always;
            rewrite ^/api(/v1/.*)$ $1 break;
            proxy_http_version 1.0;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection close;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_gateway_api;
        }

        location = /favicon.ico {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://sven_canvas_ui/favicon.ico;
        }

        location / {
            return 404;
        }
    }

