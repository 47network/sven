apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  labels:
    app.kubernetes.io/name: agent-runtime
    app.kubernetes.io/part-of: sven
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-runtime
        app.kubernetes.io/part-of: sven
    spec:
      containers:
        - name: agent-runtime
          image: ghcr.io/47network/thesven-agent-runtime:RELEASE_TAG
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sven-app-config
            - secretRef:
                name: sven-app-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-runtime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-runtime
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-runtime
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-runtime
