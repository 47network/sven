apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sven-public
spec:
  tls:
    - hosts:
        - staging.sven.systems
      secretName: sven-staging-public-tls
    - hosts:
        - admin.staging.sven.systems
      secretName: sven-staging-admin-tls
  rules:
    - host: staging.sven.systems
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: canvas-ui
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 3000
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 3000
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 3000
    - host: admin.staging.sven.systems
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 3000
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 3000
