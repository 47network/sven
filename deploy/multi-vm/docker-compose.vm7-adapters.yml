    container_name: sven-mirror-agent
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      SVEN_GATEWAY_URL: http://${VM4_INTERNAL_IP:-10.74.47.8}:${GATEWAY_PORT:-3000}
      SVEN_DEVICE_NAME: ${MIRROR_DEVICE_NAME:-Docker Mirror}
      SVEN_DEVICE_TYPE: ${MIRROR_DEVICE_TYPE:-mirror}
      SVEN_API_KEY: ${MIRROR_API_KEY:-}
    volumes:
      - mirror-agent-data:/data
    networks:
      - platform

  # ─── Promtail (ships Docker logs to Loki on VM6) ───
  promtail:
    <<: *common
    image: grafana/promtail@sha256:45d54f0ebd7a19acbcd4693a3227d84d27d98abe1dc7ea3068d31d5d02dbe696
    container_name: sven-promtail
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["-config.file=/etc/promtail/config.yml", "-config.expand-env=true"]
    environment:
      LOKI_HOST: ${VM6_INTERNAL_IP:-10.74.47.10}
      VM_NAME: vm7-adapters
    volumes:
      - ../../config/promtail-remote.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
          pids: 64
        reservations:
          cpus: "0.1"
          memory: 32M
