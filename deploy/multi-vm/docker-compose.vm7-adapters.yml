    profiles: ["adapters", "telegram"]
    image: ${REGISTRY:-sven}/adapter-telegram:${ADAPTER_TELEGRAM_TAG:-latest}
    container_name: sven-adapter-telegram
    environment:
      ADAPTER_CHANNEL: telegram
      GATEWAY_URL: http://${VM4_INTERNAL_IP:-10.74.47.8}:${GATEWAY_PORT:-3000}
      SVEN_ADAPTER_TOKEN: ${SVEN_ADAPTER_TOKEN:?SVEN_ADAPTER_TOKEN is required}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:?TELEGRAM_TOKEN is required}
      TELEGRAM_TRIGGER_PREFIX: ${TELEGRAM_TRIGGER_PREFIX:-/sven}
