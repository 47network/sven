# ─────────────────────────────────────────────────────────────────────────────
# Sven Four-VM Deployment — VM7: Channel Adapters (optional)
# Host: sven-adapters (10.47.0.9 / 10.47.47.11 / 10.74.47.11)
# Services: All channel adapters (Discord, Slack, Telegram, Matrix, Teams,
#           WhatsApp, Signal, iMessage, etc.), Cloudflared tunnel, Mirror agent
#
# Run:
#   docker compose -f docker-compose.vm7-adapters.yml \
#     --profile discord --profile slack --profile telegram \
#     --env-file .env.vm7 up -d
#
# Prerequisites:
#   - VM4 (platform) must be running first (Gateway API)
#   - .env.vm7 populated with adapter tokens (see .env.vm7.example)
#
# Note: This VM is optional. For lighter deployments, adapters can run
#       on VM4 by merging into docker-compose.vm4-platform.yml.
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "10"

x-adapter-base: &adapter-base
  <<: *common
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=32m,noexec,nosuid,nodev
  networks:
    - platform
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 512M
        pids: 64
      reservations:
        cpus: "0.1"
        memory: 64M

networks:
  platform:
    driver: bridge

volumes:
  tunnel-data:
  zalo-personal-data:
  mirror-agent-data:

services:
  # ─── Discord Adapter ───
  adapter-discord:
    <<: *adapter-base
    profiles: ["adapters", "discord"]
    image: ${REGISTRY:-sven}/adapter-discord:${ADAPTER_DISCORD_TAG:-latest}
    container_name: sven-adapter-discord
    environment:
      ADAPTER_CHANNEL: discord
      # Cross-VM: Gateway API on VM4
      GATEWAY_URL: http://${VM4_INTERNAL_IP:-10.74.47.8}:${GATEWAY_PORT:-3000}
      SVEN_ADAPTER_TOKEN: ${SVEN_ADAPTER_TOKEN:?SVEN_ADAPTER_TOKEN is required}
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      DISCORD_TRIGGER_PREFIX: ${DISCORD_TRIGGER_PREFIX:-/sven}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-2000}
      NODE_ENV: production

  # ─── Slack Adapter ───
  adapter-slack:
    <<: *adapter-base
    profiles: ["adapters", "slack"]
    image: ${REGISTRY:-sven}/adapter-slack:${ADAPTER_SLACK_TAG:-latest}
    container_name: sven-adapter-slack
    environment:
      ADAPTER_CHANNEL: slack
      GATEWAY_URL: http://${VM4_INTERNAL_IP:-10.74.47.8}:${GATEWAY_PORT:-3000}
      SVEN_ADAPTER_TOKEN: ${SVEN_ADAPTER_TOKEN:?SVEN_ADAPTER_TOKEN is required}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:?SLACK_BOT_TOKEN is required}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:?SLACK_APP_TOKEN is required}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:?SLACK_SIGNING_SECRET is required}
      SLACK_TRIGGER_PREFIX: ${SLACK_TRIGGER_PREFIX:-/sven}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-2000}
      NODE_ENV: production

  # ─── Telegram Adapter ───
  adapter-telegram:
