      NEXTCLOUD_TALK_PORT: ${NEXTCLOUD_TALK_PORT:-8495}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-2000}
      NODE_ENV: production
    ports:
      - "${VM7_INTERNAL_IP:-10.74.47.11}:${NEXTCLOUD_TALK_PORT:-8495}:8495"

  # ─── Cloudflare Tunnel (optional) ───
  cloudflared:
    <<: *common
    profiles: ["tunnel"]
    image: cloudflare/cloudflared@sha256:404528c1cd63c3eb882c257ae524919e4376115e6fe57befca8d603656a91a4c
    container_name: sven-cloudflared
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - tunnel
      - --no-autoupdate
      - --metrics
      - 0.0.0.0:2000
      - --loglevel
      - info
      - --logfile
      - /var/run/sven-tunnel/cloudflared.log
      # Cross-VM: Internal nginx on VM4
      - --url
      - http://${VM4_INTERNAL_IP:-10.74.47.8}:8088
    volumes:
      - tunnel-data:/var/run/sven-tunnel
    networks:
      - platform

  # ─── Mirror Agent (optional) ───
  sven-mirror-agent:
    <<: *common
    profiles: ["mirror"]
