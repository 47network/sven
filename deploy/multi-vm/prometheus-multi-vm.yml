# ═══════════════════════════════════════════════════════════════════════
# Sven Multi-VM — Prometheus Scrape Configuration
# Deployed on VM6 (sven-data) alongside Prometheus.
# ═══════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: sven-prod
    environment: production

scrape_configs:
  # ─────────────────────────────────────
  # VM4 — Platform
  # ─────────────────────────────────────

  - job_name: sven-gateway-api
    metrics_path: /metrics
    static_configs:
      - targets: ["10.74.47.8:3000"]
        labels:
          vm: vm4-platform
          service: gateway-api
    http_headers:
      X-Sven-Metrics-Token:
        files:
          - /etc/prometheus/metrics-token

  - job_name: sven-postgres-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["10.74.47.8:9187"]
        labels:
          vm: vm4-platform
          service: postgres-exporter

  - job_name: sven-nats-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["10.74.47.8:7777"]
        labels:
          vm: vm4-platform
          service: nats-exporter

  # ─────────────────────────────────────
  # VM5 — AI & Voice
  # ─────────────────────────────────────

  # LiteLLM: does not expose /metrics in this version

  # ─────────────────────────────────────
  # VM6 — Data & Observability (local)
  # ─────────────────────────────────────

  # OpenSearch: prometheus-exporter plugin not installed
  # Use opensearch-dashboards or _cluster/stats API for monitoring

  - job_name: sven-otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          vm: vm6-data
          service: otel-collector

  - job_name: sven-grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          vm: vm6-data
          service: grafana

  - job_name: sven-prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          vm: vm6-data
          service: prometheus

  - job_name: sven-loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          vm: vm6-data
          service: loki

  # ─────────────────────────────────────
  # Node Exporters (when installed)
  # ─────────────────────────────────────

  - job_name: node-exporters
    scrape_interval: 30s
    static_configs:
      - targets: ["10.74.47.8:9100"]
        labels:
          vm: vm4-platform
          service: node-exporter
      - targets: ["10.74.47.9:9100"]
        labels:
          vm: vm5-ai
          service: node-exporter
      - targets: ["10.74.47.10:9100"]
        labels:
          vm: vm6-data
          service: node-exporter
      - targets: ["10.74.47.11:9100"]
        labels:
          vm: vm7-adapters
          service: node-exporter
