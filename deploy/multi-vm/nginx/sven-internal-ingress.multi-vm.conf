# ─────────────────────────────────────────────────────────────
# Sven — Internal Docker Ingress (MULTI-VM)
# Runs inside Docker on VM4 as sven-internal-nginx.
# Routes traffic between co-located services on
# the sven-core Docker network.
#
# This replaces the single-node sven-internal-ingress.docker.conf
# for multi-VM deployments. External TLS is handled by
# nginx.multi-vm.conf running on the host.
# ─────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sven_gateway_api {
    server gateway-api:3000;
    keepalive 32;
}

server {
    listen 8088;
    server_name _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── SSE admin events ──
    location = /v1/admin/events {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Cache-Control     "no-cache";
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 5s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
        proxy_pass http://sven_gateway_api/v1/admin/events;
    }

    # ── API v1 ──
    location ^~ /v1/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_pass http://sven_gateway_api;
    }

    # ── Health / Readiness ──
    location = /healthz {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_gateway_api/healthz;
        access_log off;
    }

    location = /readyz {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_gateway_api/readyz;
        access_log off;
    }

    # ── Catch-all: reject unrouted requests ──
    location / {
        return 404;
    }
}
