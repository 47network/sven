# ─────────────────────────────────────────────────────────────
# TheSven — Nginx Edge Proxy (MULTI-VM)
# VM4: sven-platform (10.47.47.8)
#
# TLS entry point for Sven platforms:
#   - sven.systems / app.sven.systems → Sven services (VM4/5/6/7)
#
# Nginx runs on VM4 as a Docker container (sven-nginx).
# AI services are on VM5, Data/Monitoring on VM6.
# Adapters on VM7 connect inbound via Cloudflare Tunnel.
#
# Public 80/443 traffic reaches VM4 via 47D VM1's stream SNI
# routing (L4 TCP proxy, no TLS termination by 47D for Sven).
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Restore real client IP from PROXY protocol (47D VM1 stream) ──
    set_real_ip_from 10.47.47.5;
    real_ip_header proxy_protocol;
    real_ip_recursive on;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── WebSocket upgrade map ──
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Security headers ──
    map $sent_http_content_type $csp {
        default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss://*.sven.systems; frame-ancestors 'none';";
    }

    # ── Rate limiting zones ──
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_rate:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=adapter_rate:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=admin_rate:10m rate=10r/s;
    limit_req_log_level warn;
    limit_req_status 429;

    # ── Upstreams ──

    # Gateway API: same Docker network on VM4
    upstream gateway_api {
        server gateway-api:3000;
        keepalive 32;
    }

    # Admin UI: host port on VM4 (outside Docker)
    upstream admin_ui {
        server host.docker.internal:3100;
        keepalive 16;
    }

    # Canvas UI: Docker container on platform network
    upstream canvas_ui {
        server sven-canvas-ui:3000;
        keepalive 16;
    }

    # Grafana: runs on VM6 (service net)
    upstream grafana_backend {
        server 10.74.47.10:9091;
        keepalive 8;
    }

    # Rocket.Chat: external Sven-managed chat host on VM12
    upstream rocket_chat_talk {
        server 10.47.47.12:3000;
        keepalive 16;
    }

    # WhatsApp adapter: VM7 (sven-adapters)
    upstream whatsapp_adapter {
        server 10.47.47.11:8443;
        keepalive 8;
    }

    # ─────────────────────────────────────
    # Internal healthcheck (localhost only)
    # ─────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location = /healthz {
            proxy_pass http://gateway_api/healthz;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 444;
        }
    }

    # ─────────────────────────────────────
    # HTTP → HTTPS redirect (Sven)
    # ─────────────────────────────────────
    server {
        listen 80;
        server_name sven.systems app.sven.systems;

        # Let's Encrypt ACME challenge (certbot renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name talk.sven.systems;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name wa.sven.systems;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────
    # Installer site (sven.systems)
    # Static pages served from /usr/share/nginx/html
    # ─────────────────────────────────────
    server {
        listen 443 ssl proxy_protocol;
        http2 on;
        server_name sven.systems;

        ssl_certificate     /etc/letsencrypt/live/sven.systems/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sven.systems/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        proxy_hide_header Server;

        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location = /suite {
            try_files /suite/index.html =404;
        }

        location /suite/ {
            try_files $uri $uri/ $uri.html /suite/index.html =404;
        }

        location ^~ /assets/ {
            try_files $uri =404;
        }

        location ^~ /source/ {
            try_files $uri =404;
        }

        location = /install.sh {
            default_type text/plain;
            try_files /install.sh =404;
        }

        location = /install.ps1 {
            default_type text/plain;
            try_files /install.ps1 =404;
        }

        location = /install.cmd {
            default_type text/plain;
            try_files /install.cmd =404;
        }

        location = /favicon.ico {
            try_files /favicon.ico =404;
            access_log off;
            log_not_found off;
        }

        location = /sven-logo.png {
            try_files /sven-logo.png =404;
        }

        location / {
            return 404;
        }
    }

    # ─────────────────────────────────────
    # Main API / UI HTTPS server block
    # (app.sven.systems)
    # ─────────────────────────────────────
    server {
        listen 443 ssl proxy_protocol;
        http2 on;
        server_name app.sven.systems;

        # ── TLS ──
        ssl_certificate     /etc/letsencrypt/live/sven.systems/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sven.systems/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy $csp always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        proxy_hide_header Server;

        # ── SSE admin events (long-lived) ──
        location = /v1/admin/events {
            limit_req zone=admin_rate burst=10 nodelay;

            proxy_pass http://gateway_api/v1/admin/events;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Cache-Control      "no-cache";

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 5s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
        }

        # ── Auth endpoints (stricter rate limit for brute-force protection) ──
        location ^~ /v1/auth/ {
            limit_req zone=auth_rate burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://gateway_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Adapter webhook ingress (higher throughput) ──
        location ^~ /v1/adapters/ {
            limit_req zone=adapter_rate burst=100 nodelay;
            limit_req_status 429;

            proxy_pass http://gateway_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── API v1 proxy ──
        location ^~ /v1/ {
            limit_req zone=api_rate burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://gateway_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Health check endpoints (no rate limit) ──
        location = /healthz {
            proxy_pass http://gateway_api/healthz;
            proxy_set_header Host $host;
            access_log off;
        }
        location = /readyz {
            proxy_pass http://gateway_api/readyz;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Grafana proxy (VM6 monitoring dashboard) ──
        location /grafana/ {
            limit_req zone=admin_rate burst=20 nodelay;

            proxy_pass http://grafana_backend/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Admin UI ──
        location ^~ /admin47 {
            limit_req zone=admin_rate burst=10 nodelay;

            proxy_pass http://admin_ui;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Canvas UI / Frontend — default ──
        location / {
            proxy_pass http://canvas_ui;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Static assets caching ──
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://canvas_ui;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            access_log off;
        }
    }

    # ─────────────────────────────────────
    # Rocket.Chat HTTPS server block
    # (talk.sven.systems → VM12)
    # ─────────────────────────────────────
    server {
        listen 443 ssl proxy_protocol;
        http2 on;
        server_name talk.sven.systems;

        ssl_certificate     /etc/letsencrypt/live/talk.sven.systems/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/talk.sven.systems/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        proxy_hide_header Server;

        location / {
            proxy_pass http://rocket_chat_talk;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Nginx-Proxy true;
            proxy_redirect off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ─────────────────────────────────────
    # WhatsApp webhook (wa.sven.systems → VM7:8443)
    # ─────────────────────────────────────
    server {
        listen 443 ssl proxy_protocol;
        http2 on;
        server_name wa.sven.systems;

        ssl_certificate     /etc/letsencrypt/live/wa.sven.systems/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wa.sven.systems/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        proxy_hide_header Server;

        # Meta webhook verification (GET) and message delivery (POST)
        location /webhook {
            limit_req zone=adapter_rate burst=100 nodelay;

            proxy_pass http://whatsapp_adapter/webhook;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location / {
            return 444;
        }
    }
}
