# Sven VM6 (Data & Observability) — WireGuard Mesh
# Install: cp wg0.vm6.conf /etc/wireguard/wg0.conf
# Replace all __*__ placeholders before enabling.

[Interface]
PrivateKey = __VM6_PRIVATE_KEY__
Address = 10.47.0.8/32
ListenPort = 51820
MTU = 1420
SaveConfig = false
Table = 47100
PostUp = ip rule add from 10.47.0.8 table 47100 priority 100
PostDown = ip rule del from 10.47.0.8 table 47100 priority 100

# ── Sven VMs ──

[Peer]
# VM4 — Sven Platform (PostgreSQL, NATS, Gateway)
PublicKey = __VM4_PUBLIC_KEY__
AllowedIPs = 10.47.0.6/32
Endpoint = 10.47.47.8:51820
PersistentKeepalive = 25

[Peer]
# VM5 — Sven AI (Ollama, LiteLLM, Whisper, Piper)
PublicKey = __VM5_PUBLIC_KEY__
AllowedIPs = 10.47.0.7/32
Endpoint = 10.47.47.9:51820
PersistentKeepalive = 25

[Peer]
# VM7 — Sven Adapters (Channel Adapters, Cloudflared)
PublicKey = __VM7_PUBLIC_KEY__
AllowedIPs = 10.47.0.9/32
Endpoint = 10.47.47.11:51820
PersistentKeepalive = 25

# ── 47Dynamics VMs ──

[Peer]
# VM1 — 47Dynamics Platform (for bridge metrics/cross-platform monitoring)
PublicKey = __VM1_PUBLIC_KEY__
AllowedIPs = 10.47.0.3/32
Endpoint = 10.47.47.5:51820
PersistentKeepalive = 25

# ── Cloud Relay ──

[Peer]
# Cloud Relay
PublicKey = __CLOUD_PUBLIC_KEY__
AllowedIPs = 10.47.0.1/32
Endpoint = __CLOUD_ENDPOINT__:51820
PersistentKeepalive = 25
