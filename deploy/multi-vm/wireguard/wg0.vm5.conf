# Sven VM5 (AI & Voice) — WireGuard Mesh
# Install: cp wg0.vm5.conf /etc/wireguard/wg0.conf
# Replace all __*__ placeholders before enabling.

[Interface]
PrivateKey = __VM5_PRIVATE_KEY__
Address = 10.47.0.7/32
ListenPort = 51820
MTU = 1420
SaveConfig = false
Table = 47100
PostUp = ip rule add from 10.47.0.7 table 47100 priority 100
PostDown = ip rule del from 10.47.0.7 table 47100 priority 100

# ── Sven VMs ──

[Peer]
# VM4 — Sven Platform (PostgreSQL, NATS, Gateway)
PublicKey = __VM4_PUBLIC_KEY__
AllowedIPs = 10.47.0.6/32
Endpoint = 10.47.47.8:51820
PersistentKeepalive = 25

[Peer]
# VM6 — Sven Data (OpenSearch, RAG, Monitoring)
PublicKey = __VM6_PUBLIC_KEY__
AllowedIPs = 10.47.0.8/32
Endpoint = 10.47.47.10:51820
PersistentKeepalive = 25

[Peer]
# VM7 — Sven Adapters (Channel Adapters, Cloudflared)
PublicKey = __VM7_PUBLIC_KEY__
AllowedIPs = 10.47.0.9/32
Endpoint = 10.47.47.11:51820
PersistentKeepalive = 25

# ── 47Dynamics VMs (direct access not typically needed from AI VM) ──
# Uncomment if VM5 needs direct WireGuard routes to 47Dynamics.

# [Peer]
# # VM1 — 47Dynamics Platform
# PublicKey = __VM1_PUBLIC_KEY__
# AllowedIPs = 10.47.0.3/32
# Endpoint = 10.47.47.5:51820
# PersistentKeepalive = 25

# ── Cloud Relay ──

[Peer]
# Cloud Relay
PublicKey = __CLOUD_PUBLIC_KEY__
AllowedIPs = 10.47.0.1/32
Endpoint = __CLOUD_ENDPOINT__:51820
PersistentKeepalive = 25
