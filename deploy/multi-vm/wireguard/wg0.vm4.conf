# Sven VM4 (Platform) — WireGuard Mesh
# Install: cp wg0.vm4.conf /etc/wireguard/wg0.conf
# Replace all __*__ placeholders before enabling.

[Interface]
PrivateKey = __VM4_PRIVATE_KEY__
Address = 10.47.0.6/32
ListenPort = 51820
MTU = 1420
SaveConfig = false
# Policy routing — only tunnel traffic uses this interface
Table = 47100
PostUp = ip rule add from 10.47.0.6 table 47100 priority 100
PostDown = ip rule del from 10.47.0.6 table 47100 priority 100

# ── 47Dynamics VMs ──

[Peer]
# VM1 — 47Dynamics Platform (API-Go, PostgreSQL, Keycloak)
PublicKey = __VM1_PUBLIC_KEY__
AllowedIPs = 10.47.0.3/32
Endpoint = 10.47.47.5:51820
PersistentKeepalive = 25

[Peer]
# VM2 — 47Dynamics Data (ClickHouse, OpenSearch, MinIO)
PublicKey = __VM2_PUBLIC_KEY__
AllowedIPs = 10.47.0.4/32
Endpoint = 10.47.47.6:51820
PersistentKeepalive = 25

[Peer]
# VM3 — 47Dynamics Apps (Web, AI, Ollama)
PublicKey = __VM3_PUBLIC_KEY__
AllowedIPs = 10.47.0.5/32
Endpoint = 10.47.47.7:51820
PersistentKeepalive = 25

# ── Sven VMs ──

[Peer]
# VM5 — Sven AI (Ollama, LiteLLM, Whisper, Piper)
PublicKey = __VM5_PUBLIC_KEY__
AllowedIPs = 10.47.0.7/32
Endpoint = 10.47.47.9:51820
PersistentKeepalive = 25

[Peer]
# VM6 — Sven Data (OpenSearch, RAG, Monitoring)
PublicKey = __VM6_PUBLIC_KEY__
AllowedIPs = 10.47.0.8/32
Endpoint = 10.47.47.10:51820
PersistentKeepalive = 25

[Peer]
# VM7 — Sven Adapters (Channel Adapters, Cloudflared)
PublicKey = __VM7_PUBLIC_KEY__
AllowedIPs = 10.47.0.9/32
Endpoint = 10.47.47.11:51820
PersistentKeepalive = 25

# ── Cloud Relay (optional — for external access) ──

[Peer]
# Cloud Relay
PublicKey = __CLOUD_PUBLIC_KEY__
AllowedIPs = 10.47.0.1/32
Endpoint = __CLOUD_ENDPOINT__:51820
PersistentKeepalive = 25
