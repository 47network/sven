# ─────────────────────────────────────────────────────────────────────────────
# Sven Four-VM Deployment — VM4: Platform Services
# Host: sven-platform (10.47.0.6 / 10.74.47.8)
# Services: PostgreSQL+pgvector, NATS, Gateway API, Agent Runtime,
#           Skill Runner, Registry Worker, Notification Service,
#           Workflow Executor, bridge-47dynamics, Nginx
#
# Run:
#   docker compose -f docker-compose.vm4-platform.yml --env-file .env.vm4 up -d
#
# Prerequisites:
#   - VM6 (data) should be running first (OpenSearch, OTEL, Prometheus)
#   - TLS certs at ./ssl/{server.crt,server.key,ca.crt}
#   - .env.vm4 populated with secrets (see .env.vm4.example)
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "10"

networks:
  platform:
    driver: bridge

volumes:
  pgdata:
  pgwalarchive:
  natsdata:
  tunnel-data:
  matrix-crypto-store:

services:
  # ─── PostgreSQL 16 + pgvector ───
  postgres:
    <<: *common
    image: pgvector/pgvector@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    container_name: sven-postgres
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - max_connections=200
      - -c
      - log_min_duration_statement=500
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=60s
      - -c
      - "archive_command=test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f"
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/server.key
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${VM4_INTERNAL_IP:-10.74.47.8}:5432:5432"
      - "${VM4_SERVICE_IP:-10.74.47.8}:5432:5432"
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgwalarchive:/var/lib/postgresql/wal_archive
      - ./ssl/pg-server.crt:/var/lib/postgresql/server.crt:ro
      - ./ssl/pg-server.key:/var/lib/postgresql/server.key:ro
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
          pids: 128
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─── PostgreSQL Maintenance (VACUUM/ANALYZE) ───
  postgres-maintenance:
    <<: *common
    image: pgvector/pgvector@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    container_name: sven-postgres-maintenance
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_MAINTENANCE_INTERVAL_SECONDS: ${POSTGRES_MAINTENANCE_INTERVAL_SECONDS:-86400}
      POSTGRES_MAINTENANCE_INITIAL_DELAY_SECONDS: ${POSTGRES_MAINTENANCE_INITIAL_DELAY_SECONDS:-300}
    command:
      - /bin/sh
      - -lc
      - |
        sleep "$${POSTGRES_MAINTENANCE_INITIAL_DELAY_SECONDS}";
        while true; do
          vacuumdb -h postgres -U "$${POSTGRES_USER}" --all --analyze-in-stages --jobs=2;
          sleep "$${POSTGRES_MAINTENANCE_INTERVAL_SECONDS}";
        done
    networks:
      - platform

  # ─── NATS (JetStream) ───
  nats:
    <<: *common
    image: nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    container_name: sven-nats
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: >
      --jetstream --store_dir /data --http_port 8222
    ports:
      - "${VM4_INTERNAL_IP:-10.74.47.8}:4222:4222"
      - "${VM4_SERVICE_IP:-10.74.47.8}:4222:4222"
      - "127.0.0.1:4222:4222"
      - "${VM4_INTERNAL_IP:-10.74.47.8}:8222:8222"
      - "${VM4_SERVICE_IP:-10.74.47.8}:8222:8222"
    volumes:
      - natsdata:/data
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
          pids: 128
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── Gateway API (Fastify) ───
  gateway-api:
    <<: *common
    image: ${REGISTRY:-sven}/gateway-api:${GATEWAY_API_TAG:-latest}
    container_name: sven-gateway-api
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
      - /home/node/.sven:uid=1000,gid=1000
    environment:
      NODE_ENV: production
      SVEN_DEPLOYMENT_MODE: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      NATS_URL: nats://nats:4222
      GATEWAY_PORT: ${GATEWAY_PORT:-3000}
      GATEWAY_HOST: "0.0.0.0"
      # Cross-VM: OpenSearch on VM6
      OPENSEARCH_URL: http://${VM6_INTERNAL_IP:-10.74.47.10}:9200
      OPENSEARCH_USER: ${OPENSEARCH_USER:-admin}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD}
      # Cross-VM: LLM inference across multiple GPU hosts (HA).
      # model_registry holds per-model endpoints; OLLAMA_URL is fallback only for
      # models with non-URL endpoints (e.g. ollama://local).
      # Active backends: VM9 (10.47.47.9, 2x AMD GPU), VM13 (10.47.47.13, RTX 3060).
      OLLAMA_URL: http://${KALDOREI_IP:-10.47.47.13}:11434
      EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-true}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      EMBEDDINGS_URL: http://${KALDOREI_IP:-10.47.47.13}:11434
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-nomic-embed-text}
      EMBEDDINGS_DIM: ${EMBEDDINGS_DIM:-768}
      WAKE_WORD_BASE_URL: http://${VM5_INTERNAL_IP:-10.74.47.9}:${WAKE_WORD_PORT:-4400}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      SVEN_ADAPTER_TOKEN: ${SVEN_ADAPTER_TOKEN:?SVEN_ADAPTER_TOKEN is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-47}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      SVEN_STORAGE_ROOT: ${SVEN_STORAGE_ROOT:-/var/lib/sven/artifacts}
      ARTIFACT_STORAGE_ROOT: ${ARTIFACT_STORAGE_ROOT:-/var/lib/sven/artifacts}
      SVEN_NAS_ROOT: ${SVEN_NAS_ROOT:-/var/lib/sven/nas}
      SVEN_INTEGRATION_STORAGE_ROOT: ${SVEN_INTEGRATION_STORAGE_ROOT:-/var/lib/sven/integrations}
      # Cross-VM: OTEL on VM6
      OTEL_EXPORTER_OTLP_ENDPOINT: http://${VM6_INTERNAL_IP:-10.74.47.10}:4318
      SVEN_MIGRATION_SKIP_INCOMPATIBLE: ${SVEN_MIGRATION_SKIP_INCOMPATIBLE:-false}
      SVEN_MIGRATION_ID_MODE: ${SVEN_MIGRATION_ID_MODE:-text}
      DEEPLINK_SECRET: ${DEEPLINK_SECRET}
      SVEN_HARDENING_PROFILE: ${SVEN_HARDENING_PROFILE:-production}
      BROWSER_ENFORCE_CONTAINER: "true"
      SVEN_EGRESS_PROXY: http://${VM6_INTERNAL_IP:-10.74.47.10}:3128
      AUTH_DISABLE_TOKEN_EXCHANGE: "true"
      SVEN_METRICS_AUTH_TOKEN: ${SVEN_METRICS_AUTH_TOKEN}
      NODE_EXTRA_CA_CERTS: /etc/ssl/sven/ca.crt
      # ── Pattern module env vars (gateway-api) ──
      SVEN_ATTESTATION_SECRET: ${SVEN_ATTESTATION_SECRET:-}
      SVEN_DISTILLATION_SECRET: ${SVEN_DISTILLATION_SECRET:-}
      SVEN_DISTILLATION_SERVICE_ID: gateway-api
      FEATURE_PROMPT_GUARD_ENABLED: ${FEATURE_PROMPT_GUARD_ENABLED:-false}
      FEATURE_ANTI_DISTILLATION_ENABLED: ${FEATURE_ANTI_DISTILLATION_ENABLED:-false}
      FEATURE_ANTI_DISTILLATION_PERCENTAGE: ${FEATURE_ANTI_DISTILLATION_PERCENTAGE:-0}
      FEATURE_CLIENT_ATTESTATION_ENABLED: ${FEATURE_CLIENT_ATTESTATION_ENABLED:-false}
      FEATURE_MEMORY_EXTRACTOR_AUTO_DREAM: ${FEATURE_MEMORY_EXTRACTOR_AUTO_DREAM:-false}
      FEATURE_BUDDY_ENHANCED_DIGEST: ${FEATURE_BUDDY_ENHANCED_DIGEST:-false}
    ports:
      - "${VM4_INTERNAL_IP:-10.74.47.8}:${GATEWAY_PORT:-3000}:${GATEWAY_PORT:-3000}"
      - "127.0.0.1:${GATEWAY_PORT:-3000}:${GATEWAY_PORT:-3000}"
    volumes:
      - ${SVEN_PROD_ARTIFACTS_DIR:-/srv/sven/prod/data/artifacts}:${SVEN_STORAGE_ROOT:-/var/lib/sven/artifacts}
      - ${SVEN_PROD_NAS_DIR:-/srv/sven/prod/data/nas}:${SVEN_NAS_ROOT:-/var/lib/sven/nas}
      - ${SVEN_PROD_INTEGRATIONS_DIR:-/srv/sven/prod/data/integrations}:${SVEN_INTEGRATION_STORAGE_ROOT:-/var/lib/sven/integrations}
      - ${SVEN_PROD_BACKUPS_DIR:-/srv/sven/prod/backups}:/var/lib/sven/backups
      - tunnel-data:/var/run/sven-tunnel:ro
      - ./ssl/ca.crt:/etc/ssl/sven/ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:${GATEWAY_PORT:-3000}/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
          pids: 256
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── Agent Runtime ───
  agent-runtime:
    <<: *common
    image: ${REGISTRY:-sven}/agent-runtime:${AGENT_RUNTIME_TAG:-latest}
    container_name: sven-agent-runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    environment:
      NODE_ENV: production
      SVEN_DEPLOYMENT_MODE: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      NATS_URL: nats://nats:4222
      # Cross-VM: OLLAMA_URL is fallback only; model_registry drives per-model routing.
      OLLAMA_URL: http://${KALDOREI_IP:-10.47.47.13}:11434
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2:3b}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://${VM6_INTERNAL_IP:-10.74.47.10}:4318
      NODE_EXTRA_CA_CERTS: /etc/ssl/sven/ca.crt
      # ── Pattern Module Feature Flags ──
      FEATURE_PROMPT_GUARD_ENABLED: "true"
      FEATURE_MEMORY_EXTRACTOR_ENABLED: "true"
      FEATURE_ANTI_DISTILLATION_ENABLED: "true"
      SVEN_FINGERPRINT_SECRET: ${SVEN_FINGERPRINT_SECRET:-sven-fp-default-change-me}
      SVEN_WATERMARK_ENABLED: "true"
      SVEN_WATERMARK_PAYLOAD: sven
      SVEN_WATERMARK_DENSITY: "0.3"
      # ── Buddy Enhancement ──
      BUDDY_PERSONALITY_MODE: ${BUDDY_PERSONALITY_MODE:-professional}
      BUDDY_STREAK_TRACKING: "true"
      # ── Token Budget ──
      FEATURE_TOKEN_BUDGET_ENABLED: "true"
      TOKEN_BUDGET_MAX_TOKENS: ${TOKEN_BUDGET_MAX_TOKENS:-0}
      TOKEN_BUDGET_MAX_COST_USD: ${TOKEN_BUDGET_MAX_COST_USD:-0}
      TOKEN_BUDGET_MAX_TURNS: ${TOKEN_BUDGET_MAX_TURNS:-50}
      # ── Client Attestation ──
      FEATURE_CLIENT_ATTESTATION_ENABLED: ${FEATURE_CLIENT_ATTESTATION_ENABLED:-false}
      SVEN_ATTESTATION_SECRET: ${SVEN_ATTESTATION_SECRET:-}
    volumes:
      - ${SVEN_PROD_ARTIFACTS_DIR:-/srv/sven/prod/data/artifacts}:${SVEN_STORAGE_ROOT:-/var/lib/sven/artifacts}
      - ${SVEN_PROD_NAS_DIR:-/srv/sven/prod/data/nas}:${SVEN_NAS_ROOT:-/var/lib/sven/nas}
      - ${SVEN_PROD_INTEGRATIONS_DIR:-/srv/sven/prod/data/integrations}:${SVEN_INTEGRATION_STORAGE_ROOT:-/var/lib/sven/integrations}
      - ./ssl/ca.crt:/etc/ssl/sven/ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
          pids: 128
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── Skill Runner ───
  skill-runner:
    <<: *common
    image: ${REGISTRY:-sven}/skill-runner:${SKILL_RUNNER_TAG:-latest}
    container_name: sven-skill-runner
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      DATABASE_READ_URL: ${DATABASE_READ_URL:-}
      NATS_URL: nats://nats:4222
      SVEN_DYNAMIC_SKILLS_DIR: /opt/sven/registry
      # Cross-VM: Egress proxy on VM6, SearXNG on VM6
      SVEN_EGRESS_PROXY: http://${VM6_INTERNAL_IP:-10.74.47.10}:3128
      SEARXNG_URL: http://${VM6_INTERNAL_IP:-10.74.47.10}:8080
      SVEN_INTEGRATION_STORAGE_ROOT: ${SVEN_INTEGRATION_STORAGE_ROOT:-/var/lib/sven/integrations}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://${VM6_INTERNAL_IP:-10.74.47.10}:4318
      NODE_EXTRA_CA_CERTS: /etc/ssl/sven/ca.crt
      # ── Pattern Module Config ──
      SVEN_COMMIT_AUTHOR_NAME: ${SVEN_COMMIT_AUTHOR_NAME:-Sven}
      SVEN_COMMIT_AUTHOR_EMAIL: ${SVEN_COMMIT_AUTHOR_EMAIL:-sven@sven.systems}
      # ── Security Scanning ──
      FEATURE_PROMPT_GUARD_OUTPUT_SCAN: "true"
      FEATURE_ANTI_DISTILLATION_TOOL_OUTPUTS: "true"
      SVEN_FINGERPRINT_SECRET: ${SVEN_FINGERPRINT_SECRET:-sven-fp-default-change-me}
      SVEN_WATERMARK_ENABLED: "true"
      SVEN_WATERMARK_PAYLOAD: sven
      # ── Client Attestation ──
      FEATURE_CLIENT_ATTESTATION_ENABLED: ${FEATURE_CLIENT_ATTESTATION_ENABLED:-false}
      SVEN_ATTESTATION_SECRET: ${SVEN_ATTESTATION_SECRET:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SVEN_REGISTRY_ROOT:-/srv/sven/prod/data/skills}:/opt/sven/registry:ro
      - ${SVEN_PROD_INTEGRATIONS_DIR:-/srv/sven/prod/data/integrations}:${SVEN_INTEGRATION_STORAGE_ROOT:-/var/lib/sven/integrations}
      - ${SVEN_PROD_GIT_DIR:-/srv/sven/prod/data/git}:${GIT_INGEST_CLONE_ROOT:-/var/lib/sven/git}
      - ./ssl/ca.crt:/etc/ssl/sven/ca.crt:ro
      - ${COPILOT_CREDS_DIR:-/root/.config/github-copilot}:/root/.config/github-copilot:ro
      - ${GEMINI_CREDS_DIR:-/root/.gemini}:/root/.gemini:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
          pids: 256
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── Registry Worker ───
  registry-worker:
    <<: *common
    image: ${REGISTRY:-sven}/registry-worker:${REGISTRY_WORKER_TAG:-latest}
    container_name: sven-registry-worker
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      REGISTRY_SCAN_INTERVAL_MS: ${REGISTRY_SCAN_INTERVAL_MS:-300000}
      COSIGN_BIN: ${COSIGN_BIN:-}
      COSIGN_PUBLIC_KEY: ${COSIGN_PUBLIC_KEY:-}
      NODE_EXTRA_CA_CERTS: /etc/ssl/sven/ca.crt
    volumes:
      - ${SVEN_REGISTRY_ROOT:-/srv/sven/prod/data/skills}:/opt/sven/registry:ro
      - ./ssl/ca.crt:/etc/ssl/sven/ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
          pids: 64
        reservations:
          cpus: "0.1"
          memory: 128M

  # ─── Notification Service ───
  notification-service:
    <<: *common
    image: ${REGISTRY:-sven}/notification-service:${NOTIFICATION_SERVICE_TAG:-latest}
    container_name: sven-notification-service
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      NATS_URL: nats://nats:4222
      EXPO_PUSH_URL: ${EXPO_PUSH_URL:-}
      HA_BASE_URL: ${HA_BASE_URL:-}
      HA_TOKEN: ${HA_TOKEN:-}
      HA_POLL_INTERVAL_MS: ${HA_POLL_INTERVAL_MS:-30000}
      NODE_EXTRA_CA_CERTS: /etc/ssl/sven/ca.crt
      # ── Pattern Module Config ──
      FEATURE_ASYNC_DELIVERY_ENABLED: "true"
      FEATURE_CLIENT_ATTESTATION_ENABLED: ${FEATURE_CLIENT_ATTESTATION_ENABLED:-false}
      SVEN_ATTESTATION_SECRET: ${SVEN_ATTESTATION_SECRET:-}
    volumes:
      - ./ssl/ca.crt:/etc/ssl/sven/ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
          pids: 128
        reservations:
          cpus: "0.25"
          memory: 128M

  # ─── Workflow Executor ───
  workflow-executor:
    <<: *common
    image: ${REGISTRY:-sven}/workflow-executor:${WORKFLOW_EXECUTOR_TAG:-latest}
    container_name: sven-workflow-executor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://${VM6_INTERNAL_IP:-10.74.47.10}:4318
      NODE_EXTRA_CA_CERTS: /etc/ssl/sven/ca.crt
      # ── Pattern Module Config ──
      FEATURE_TOKEN_BUDGET_WORKFLOW: ${FEATURE_TOKEN_BUDGET_WORKFLOW:-false}
      FEATURE_CLIENT_ATTESTATION_ENABLED: ${FEATURE_CLIENT_ATTESTATION_ENABLED:-false}
      SVEN_ATTESTATION_SECRET: ${SVEN_ATTESTATION_SECRET:-}
    volumes:
      - ./ssl/ca.crt:/etc/ssl/sven/ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
          pids: 128
        reservations:
          cpus: "0.25"
          memory: 128M

  # ─── bridge-47dynamics (gRPC bridge to 47Dynamics) ───
  bridge-47dynamics:
    <<: *common
    image: ${REGISTRY:-sven}/bridge-47dynamics:${BRIDGE_TAG:-latest}
    container_name: sven-bridge-47dynamics
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    environment:
      NODE_ENV: production
      BRIDGE_GRPC_PORT: "4020"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      NATS_URL: nats://nats:4222
      BRIDGE_TLS_CERT: /certs/bridge.crt
      BRIDGE_TLS_KEY: /certs/bridge.key
      BRIDGE_TLS_CA: /certs/ca.crt
      BRIDGE_SERVICE_TOKEN: ${SVEN_BRIDGE_SERVICE_TOKEN:?SVEN_BRIDGE_SERVICE_TOKEN is required}
      BRIDGE_ORG_ID: ${SVEN_BRIDGE_ORG_ID:-47dynamics-legacy-org}
      BRIDGE_CHAT_ID: ${SVEN_BRIDGE_CHAT_ID:-47dynamics-hq}
      BRIDGE_AGENT_ID: ${SVEN_BRIDGE_AGENT_ID:-47dynamics-copilot}
      BRIDGE_REQUIRE_TENANT_MAPPING: ${SVEN_BRIDGE_REQUIRE_TENANT_MAPPING:-false}
      NODE_EXTRA_CA_CERTS: /etc/ssl/sven/ca.crt
    ports:
      - "${VM4_INTERNAL_IP:-10.74.47.8}:4020:4020"
      - "127.0.0.1:4020:4020"
    volumes:
      - ./ssl/bridge:/certs:ro
      - ./ssl/ca.crt:/etc/ssl/sven/ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const n=require('net');const c=n.connect(4020,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 128
        reservations:
          cpus: "0.25"
          memory: 128M

  # ─── Sven Internal Nginx (ingress within Docker) ───
  sven-internal-nginx:
    <<: *common
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    container_name: sven-internal-nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ../../deploy/quickstart:/usr/share/nginx/html:ro
      - ./nginx/sven-internal-ingress.multi-vm.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway-api:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 128
        reservations:
          cpus: "0.1"
          memory: 64M

  # ─── Nginx (TLS terminator / reverse proxy) ───
  nginx:
    <<: *common
    image: nginx:1.27-alpine
    container_name: sven-nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.multi-vm.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /srv/sven/prod/certbot/webroot:/var/www/certbot:ro
      - /srv/sven/prod/certbot/conf:/etc/letsencrypt:ro
      - ../../deploy/quickstart:/usr/share/nginx/html:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      gateway-api:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
          pids: 128
        reservations:
          cpus: "0.1"
          memory: 64M

  # ─── Matrix Adapter (Sven AI bot for Matrix) ───
  adapter-matrix:
    <<: *common
    image: ${REGISTRY:-sven}/adapter-matrix:${ADAPTER_MATRIX_TAG:-latest}
    container_name: sven-adapter-matrix
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    volumes:
      - matrix-crypto-store:/data/crypto
    extra_hosts:
      - "deception.sven.systems:${VM12_MATRIX_IP:-10.47.47.12}"
      - "auth.deception.sven.systems:${VM12_MATRIX_IP:-10.47.47.12}"
    environment:
      ADAPTER_CHANNEL: matrix
      GATEWAY_URL: http://gateway-api:${GATEWAY_PORT:-3000}
      SVEN_ADAPTER_TOKEN: ${SVEN_ADAPTER_TOKEN:?SVEN_ADAPTER_TOKEN is required}
      SVEN_ORG_ID: ${SVEN_ORG_ID:?SVEN_ORG_ID is required}
      MATRIX_HOMESERVER_URL: ${MATRIX_HOMESERVER_URL:?MATRIX_HOMESERVER_URL is required}
      MATRIX_ACCESS_TOKEN: ${MATRIX_ACCESS_TOKEN:?MATRIX_ACCESS_TOKEN is required}
      MATRIX_USER_ID: ${MATRIX_USER_ID:?MATRIX_USER_ID is required}
      MATRIX_DEVICE_ID: ${MATRIX_DEVICE_ID:-SVENBOT}
      MATRIX_BOT_NAME: ${MATRIX_BOT_NAME:-sven}
      MATRIX_AUTO_JOIN: ${MATRIX_AUTO_JOIN:-true}
      MATRIX_ALLOWED_ROOM_IDS: ${MATRIX_ALLOWED_ROOM_IDS:-}
      MATRIX_TRIGGER_PREFIX: ${MATRIX_TRIGGER_PREFIX:-/sven}
      MATRIX_SYNC_MS: ${MATRIX_SYNC_MS:-1500}
      MATRIX_E2EE_ENABLED: ${MATRIX_E2EE_ENABLED:-false}
      MATRIX_CRYPTO_STORE_PATH: /data/crypto
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-2000}
      NODE_ENV: production
    depends_on:
      gateway-api:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
          pids: 64
        reservations:
          cpus: "0.1"
          memory: 64M

  # ─── PostgreSQL Exporter (Prometheus metrics for PostgreSQL) ───
  postgres-exporter:
    <<: *common
    image: prometheuscommunity/postgres-exporter@sha256:6999a7657e2f2fb0ca6ebf417213eebf6dc7d21b30708c622f6fcb11183a2bb0
    container_name: sven-postgres-exporter
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB}?sslmode=require
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    ports:
      - "${VM4_INTERNAL_IP:-10.74.47.8}:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 64
        reservations:
          cpus: "0.1"
          memory: 64M

  # ─── NATS Prometheus Exporter ───
  nats-exporter:
    <<: *common
    image: natsio/prometheus-nats-exporter@sha256:1f6787754b8b083f271adea4bb699b9c9e21279c89d903f1710f7647c604f145
    container_name: sven-nats-exporter
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    command: ["-varz", "-connz", "-routez", "-jsz", "all", "http://nats:8222"]
    ports:
      - "${VM4_INTERNAL_IP:-10.74.47.8}:7777:7777"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
          pids: 64
        reservations:
          cpus: "0.1"
          memory: 32M

  # ─── Promtail (ships Docker logs to Loki on VM6) ───
  promtail:
    <<: *common
    image: grafana/promtail@sha256:45d54f0ebd7a19acbcd4693a3227d84d27d98abe1dc7ea3068d31d5d02dbe696
    container_name: sven-promtail
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["-config.file=/etc/promtail/config.yml", "-config.expand-env=true"]
    environment:
      LOKI_HOST: ${VM6_INTERNAL_IP:-10.74.47.10}
      VM_NAME: vm4-platform
    volumes:
      - ../../config/promtail-remote.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - platform
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
          pids: 64
        reservations:
          cpus: "0.1"
          memory: 32M
