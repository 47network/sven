# ─────────────────────────────────────────────────────────────
# 47Network Website — Nginx (daedalus, VM 547, 10.47.47.14)
#
# Plain HTTP static file server on port 80.
# TLS termination handled by 47d-platform (VM1).
# Traffic arrives via VM1 reverse proxy on the internal VLAN.
# ─────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name the47network.com www.the47network.com;
    root /var/www/the47network.com;
    index index.html;

    # ── Security headers (defense-in-depth even behind reverse proxy) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Static assets caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── favicon.ico ──
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # ── robots.txt ──
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ── Clean URLs: try file, then dir, then .html, then 404 ──
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom 404 ──
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Access log ──
    access_log /var/log/nginx/the47network.access.log;
    error_log  /var/log/nginx/the47network.error.log warn;
}
