# ─────────────────────────────────────────────────────────────
# plate.the47network.com — Nginx (daedalus, VM14, 10.47.47.14)
#
# Plain HTTP static file server on port 8080.
# TLS termination handled by 47d-platform (VM1).
# ─────────────────────────────────────────────────────────────

server {
    listen 8080;
    server_name plate.the47network.com;
    root /var/www/plate.the47network.com;
    index index.html;

    # ── Security headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Static assets caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── favicon.ico ──
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # ── robots.txt ──
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ── Clean URLs ──
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom 404 ──
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Deny dotfiles ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
