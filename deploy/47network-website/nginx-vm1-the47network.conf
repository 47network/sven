# ─────────────────────────────────────────────────────────────
# 47Dynamics — Nginx reverse-proxy / TLS terminator (HYBRID NATIVE)
# VM1: 47dynamics-platform (10.47.47.5)
#
# Nginx runs NATIVELY on VM1 (apt install nginx, systemd).
# API-Go and Keycloak run as Docker host-networked containers on VM1.
# Web (Next.js) runs on VM1 (Docker host-networked). AI runs on VM3.
#
# L4 stream block (ssl_preread) routes TLS by SNI:
#   sven.systems / app.sven.systems  → TCP proxy to VM4 (10.47.47.8:443)
#   47dynamics domains / default     → local http block (127.0.0.1:8443)
#
# Port 80 is routed at L7 (http) by server_name.
#
# This file replaces /etc/nginx/nginx.conf entirely (not sites-available).
# Install:
#   sudo cp nginx.hybrid.conf /etc/nginx/nginx.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

load_module modules/ngx_stream_module.so;

user nobody nogroup;
worker_processes auto;
worker_rlimit_nofile 8192;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
}

# ─────────────────────────────────────────────────────────────
# L4 Stream: SNI-based TLS routing
#
# Reads the TLS ClientHello to extract the SNI hostname before any
# decryption occurs.  Sven traffic is TCP-proxied straight to VM4
# (Sven terminates TLS with its own Let's Encrypt certs).
# 47Dynamics traffic is forwarded to the local http block on 4443.
#
# PROXY protocol is enabled on the stream→backend path so that
# both the local http block and Sven VM4 receive the real client IP.
# ─────────────────────────────────────────────────────────────
stream {
    log_format stream_main '$remote_addr [$time_local] '
                           '$protocol $status $bytes_sent $bytes_received '
                           '$session_time $upstream_addr '
                           '"$ssl_preread_server_name"';
    access_log /var/log/nginx/stream_access.log stream_main;

    map $ssl_preread_server_name $tls_backend {
        sven.systems            sven_tls;
        app.sven.systems        sven_tls;
        talk.sven.systems               sven_tls;
        wa.sven.systems                 sven_tls;
        deception.sven.systems          sven_tls;
        auth.deception.sven.systems     sven_tls;
        the47network.com                local_47d_tls;
        www.the47network.com            local_47d_tls;
        default                 local_47d_tls;
    }

    upstream sven_tls {
        server 10.47.47.8:443;
    }

    upstream local_47d_tls {
        server 127.0.0.1:4443;
    }

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $tls_backend;
        proxy_protocol on;
        proxy_connect_timeout 5s;
        proxy_timeout 3600s;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;
    client_body_buffer_size 256k;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Security headers ──
    map $sent_http_content_type $csp {
        default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.dynamics.the47network.com wss://*.dynamics.the47network.com https://dynamics.the47network.com; frame-src https://dynamics.the47network.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;";
    }

    # ── Restore real client IP from PROXY protocol (stream block) ──
    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;
    real_ip_recursive on;

    # ── Rate limiting zones ──
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_rate:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ai_rate:10m rate=2r/s;

    # ── Upstreams ──
    # API-Go: Docker host-networked on VM1 — accessible at localhost:4000
    upstream api_backend {
        server 127.0.0.1:4000;
        keepalive 32;
    }

    # Web: Docker host-networked on VM1 — accessible at localhost:3000
    upstream web_frontend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # Keycloak: Docker host-networked on VM1 — HTTP at localhost:8080
    upstream keycloak_backend {
        server 127.0.0.1:8080;
        keepalive 8;
    }

    # AI: runs on VM3 — resolved via /etc/hosts (ai.dynamics.fortyseven.grid)
    upstream ai_backend {
        server ai.dynamics.fortyseven.grid:4010;
        keepalive 4;
    }

    # the47network.com — Website hosted on daedalus (VM 547)
    upstream daedalus_website {
        server 10.47.47.14:80;
        keepalive 4;
    }

    # ─────────────────────────────────────
    # Default server — reject unknown Host headers (security hardening)
    # Without this, nginx serves content to any Host header that reaches the IP.
    # ─────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 444;  # close connection without response
    }

    server {
        listen 127.0.0.1:4443 ssl proxy_protocol http2 default_server;
        server_name _;
        ssl_certificate     /etc/47dynamics/ssl/server.crt;
        ssl_certificate_key /etc/47dynamics/ssl/server.key;
        ssl_reject_handshake on;  # reject TLS handshake for unknown SNI (nginx 1.19.4+)
    }

    # ─────────────────────────────────────
    # Port 80: Sven domains → proxy to VM4
    # ─────────────────────────────────────
    server {
        listen 80;
        server_name sven.systems app.sven.systems talk.sven.systems wa.sven.systems deception.sven.systems auth.deception.sven.systems;

        location / {
            proxy_pass http://10.47.47.8:80;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─────────────────────────────────────
    # the47network.com — HTTP → HTTPS redirect
    # ─────────────────────────────────────
    server {
        listen 80;
        server_name the47network.com www.the47network.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://the47network.com$request_uri;
        }
    }

    # ─────────────────────────────────────
    # the47network.com — TLS termination + proxy to daedalus
    # ─────────────────────────────────────
    server {
        listen 127.0.0.1:4443 ssl proxy_protocol http2;
        server_name the47network.com;

        ssl_certificate     /etc/letsencrypt/live/the47network.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/the47network.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:THE47NET_SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://daedalus_website;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://daedalus_website;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }
    }

    # www.the47network.com → redirect to apex
    server {
        listen 127.0.0.1:4443 ssl proxy_protocol http2;
        server_name www.the47network.com;

        ssl_certificate     /etc/letsencrypt/live/the47network.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/the47network.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        return 301 https://the47network.com$request_uri;
    }

    # ─────────────────────────────────────
    # Old domain 301 redirects (backward compat — 6 months minimum)
    # ─────────────────────────────────────
    server {
        listen 80;
        server_name 47dynamics.the47network.com app.47dynamics.the47network.com auth.47dynamics.the47network.com api.47dynamics.the47network.com;

        # Let's Encrypt ACME challenge (shared cert covers old + new domains)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://dynamics.the47network.com$request_uri;
        }
    }
    server {
        listen 127.0.0.1:4443 ssl proxy_protocol http2;
        server_name 47dynamics.the47network.com app.47dynamics.the47network.com auth.47dynamics.the47network.com api.47dynamics.the47network.com;
        ssl_certificate     /etc/47dynamics/ssl/server.crt;
        ssl_certificate_key /etc/47dynamics/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        return 301 https://dynamics.the47network.com$request_uri;
    }

    # ─────────────────────────────────────
    # HTTP → HTTPS redirect (47Dynamics)
    # ─────────────────────────────────────
    server {
        listen 80;
        server_name dynamics.the47network.com app.dynamics.the47network.com auth.dynamics.the47network.com api.dynamics.the47network.com;

        # Let's Encrypt ACME challenge (certbot renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────
    # Main HTTPS server block (47Dynamics)
    # Listens on 127.0.0.1:4443 — traffic arrives via stream SNI routing
    # ─────────────────────────────────────
    server {
        listen 127.0.0.1:4443 ssl proxy_protocol http2;
        server_name dynamics.the47network.com app.dynamics.the47network.com auth.dynamics.the47network.com api.dynamics.the47network.com;

        # ── TLS ──
        ssl_certificate     /etc/47dynamics/ssl/server.crt;
        ssl_certificate_key /etc/47dynamics/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy $csp always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header X-DNS-Prefetch-Control "off" always;

        # ── Hide upstream server identity ──
        proxy_hide_header Server;

        # ── SSE event stream (long-lived connections) ──
        location /api/events/ {
            limit_req zone=api_rate burst=20 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 10s;
            proxy_send_timeout    86400s;
            proxy_read_timeout    86400s;
        }

        # ── Relay WebSocket tunnels (bidirectional, long-lived) ──
        location /api/relay/ws/ {
            limit_req zone=api_rate burst=20 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;

            proxy_buffering off;
            proxy_cache off;
        }

        # ── Agent / internal API v1 — path passed through as-is ──
        # Go mounts mTLS agent routes at /api/v1/agents/* and internal
        # service routes at /api/v1/internal/*. These must NOT be rewritten.
        location /api/v1/ {
            limit_req zone=api_rate burst=50 nodelay;

            proxy_pass http://api_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    60s;
        }

        # ── API proxy (management routes — strip /api/ prefix) ──
        location /api/ {
            limit_req zone=api_rate burst=50 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    60s;
        }

        # ── Keycloak (auth) proxy — HTTP internally ──
        # KC_HTTP_RELATIVE_PATH=/auth — pass the full URI so Keycloak
        # receives /auth/realms/... as it expects.
        location /auth/ {
            limit_req zone=auth_rate burst=10 nodelay;

            proxy_pass http://keycloak_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffer_size 128k;
            proxy_buffers     4 256k;
            proxy_busy_buffers_size 256k;

            # proxy_cookie_path not needed: KC_HTTP_RELATIVE_PATH=/auth sets correct paths
        }

        # ── Keycloak direct paths ──
        # keycloak-js 26 hits /realms/... but KC_HTTP_RELATIVE_PATH=/auth
        # requires /auth/realms/... on the backend.
        # ^~ prevents the static-asset regex from stealing .css/.js/.ico requests
        location ^~ /realms/ {
            limit_req zone=auth_rate burst=10 nodelay;
            proxy_pass http://keycloak_backend/auth/realms/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffer_size 128k;
            proxy_buffers     4 256k;
            proxy_busy_buffers_size 256k;
        }

        location ^~ /resources/ {
            proxy_pass http://keycloak_backend/auth/resources/;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Health check endpoint (no rate limit) ──
        location = /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── AI proxy (stricter rate limit) ──
        location /ai/ {
            limit_req zone=ai_rate burst=5 nodelay;

            rewrite ^/ai/(.*) /$1 break;
            proxy_pass http://ai_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    120s;
        }

        # ── Frontend (Next.js) — default ──
        location / {
            proxy_pass http://web_frontend;
            proxy_hide_header Content-Security-Policy;
            # Must repeat all security headers — nginx clears parent add_header in location blocks
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Content-Security-Policy $csp always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header X-DNS-Prefetch-Control "off" always;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # ── Static assets caching ──
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://web_frontend;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Content-Security-Policy $csp always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header X-DNS-Prefetch-Control "off" always;
            access_log off;
        }
    }
}
