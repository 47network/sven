name: 🐛 Bug Report
description: Report a bug or unexpected behaviour in Sven.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill out the sections below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal set of steps to trigger the issue.
      placeholder: |
        1. Navigate to …
        2. Click on …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Sven is affected?
      options:
        - Gateway API
        - Admin UI
        - Canvas UI
        - Agent Runtime
        - Skill Runner
        - Channel Adapter
        - CLI
        - Mobile App
        - Desktop App
        - RAG Pipeline
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sven version
      description: Output of `sven --version` or the commit SHA.
      placeholder: v0.3.0 or abc1234
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Self-hosted (Docker Compose)
        - Self-hosted (Kubernetes)
        - SaaS (app.sven.systems)
        - Development (local)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste log output, error messages, or attach screenshots.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, browser, Node version, or anything else relevant.
      placeholder: Ubuntu 24.04, Node 24, Chrome 126
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest version (or have noted the version above).
          required: false
