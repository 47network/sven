      - name: Upload gateway log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-log-parity-e2e
          path: gateway.log

      - name: Stop gateway
        if: always()
        run: |
          if [ -f gateway.pid ]; then kill $(cat gateway.pid) || true; fi
          docker rm -f sven-nats || true
