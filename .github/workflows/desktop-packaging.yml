name: Desktop Packaging (Deprecated)

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/desktop-packaging.yml"
      - "scripts/electron-deprecation-check.cjs"
      - "docs/ops/electron-deprecation-runbook-2026.md"

jobs:
  deprecation-guard:
    name: deprecation-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run Electron deprecation check
        run: node scripts/electron-deprecation-check.cjs

      - name: Deprecation notice
        run: |
          echo "Electron desktop packaging is deprecated."
          echo "Use desktop-tauri-release workflow for desktop release artifacts."
