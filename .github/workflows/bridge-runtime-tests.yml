name: bridge-runtime-tests

on:
  pull_request:
    paths:
      - 'services/bridge-47dynamics/**'
      - 'contracts/grpc/sven-bridge/v1/sven_bridge.proto'
      - '.github/workflows/bridge-runtime-tests.yml'
  push:
    branches:
      - thesven
      - main
    paths:
      - 'services/bridge-47dynamics/**'
      - 'contracts/grpc/sven-bridge/v1/sven_bridge.proto'
      - '.github/workflows/bridge-runtime-tests.yml'
  workflow_dispatch:
    inputs:
      runner_target:
        description: 'Runner target for manual execution'
        required: false
        default: 'self-hosted'
        type: choice
        options:
          - self-hosted
          - github-hosted

jobs:
  bridge-runtime-self-hosted:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner_target == 'self-hosted' }}
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/**/package-lock.json

      - name: Install bridge dependencies
        run: npm install
        working-directory: services/bridge-47dynamics

      - name: Run bridge runtime tests
        run: npm run test:runtime
        working-directory: services/bridge-47dynamics

  bridge-runtime-github-hosted:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runner_target == 'github-hosted' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/**/package-lock.json

      - name: Install bridge dependencies
        run: npm install
        working-directory: services/bridge-47dynamics

      - name: Run bridge runtime tests
        run: npm run test:runtime
        working-directory: services/bridge-47dynamics
