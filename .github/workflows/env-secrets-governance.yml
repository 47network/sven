name: env-secrets-governance

on:
  workflow_dispatch:
  push:
    paths:
      - 'config/env/**'
      - 'docs/security/secrets-inventory-2026.md'
      - 'docs/ops/key-rotation-and-propagation-runbook-2026.md'
      - 'scripts/env-secrets-management-check.cjs'
      - 'scripts/config-externalization-check.cjs'
      - 'scripts/environment-config-check.cjs'
      - 'scripts/config-audit-trail-check.cjs'
      - 'apps/companion-mobile/**'
      - 'services/**'
      - 'packages/**'
      - '.github/workflows/env-secrets-governance.yml'


permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Environment secrets governance gate
        run: node scripts/env-secrets-management-check.cjs --strict

      - name: Config externalization gate
        run: node scripts/config-externalization-check.cjs --strict

      - name: Environment-specific config gate
        run: node scripts/environment-config-check.cjs --strict

      - name: Config audit trail gate
        run: node scripts/config-audit-trail-check.cjs --strict

      - name: Upload env secrets status
        uses: actions/upload-artifact@v4
        with:
          name: env-secrets-governance-status
          path: |
            docs/release/status/env-secrets-management-latest.json
            docs/release/status/env-secrets-management-latest.md
            docs/release/status/config-externalization-latest.json
            docs/release/status/config-externalization-latest.md
            docs/release/status/environment-config-latest.json
            docs/release/status/environment-config-latest.md
            docs/release/status/config-audit-trail-latest.json
            docs/release/status/config-audit-trail-latest.md
