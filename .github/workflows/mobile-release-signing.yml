name: mobile-release-signing

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Mobile release signing evidence gate
        run: node scripts/mobile-release-signing-check.cjs --strict

      - name: Upload mobile signing status
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-signing-status
          path: |
            docs/release/status/mobile-release-signing-latest.json
            docs/release/status/mobile-release-signing-latest.md
