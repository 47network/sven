name: desktop-tauri-release

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/companion-desktop-tauri/**'
      - '.github/workflows/desktop-tauri-release.yml'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: pnpm install --filter ./apps/companion-desktop-tauri

      - name: Typecheck desktop frontend
        run: pnpm --filter ./apps/companion-desktop-tauri run typecheck

      - name: Cargo check desktop backend
        run: |
          mkdir -p apps/companion-desktop-tauri/dist
          cargo check --manifest-path apps/companion-desktop-tauri/src-tauri/Cargo.toml

      - name: Build Tauri (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter ./apps/companion-desktop-tauri run tauri:build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-tauri-windows
          path: apps/companion-desktop-tauri/src-tauri/target/release/bundle/**
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install desktop dependencies
        run: pnpm install --filter ./apps/companion-desktop-tauri

      - name: Typecheck desktop frontend
        run: pnpm --filter ./apps/companion-desktop-tauri run typecheck

      - name: Cargo check desktop backend
        run: |
          mkdir -p apps/companion-desktop-tauri/dist
          cargo check --manifest-path apps/companion-desktop-tauri/src-tauri/Cargo.toml

      - name: Build Tauri (Linux)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter ./apps/companion-desktop-tauri run tauri:build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-tauri-linux
          path: apps/companion-desktop-tauri/src-tauri/target/release/bundle/**
          if-no-files-found: error

  checksums:
    runs-on: ubuntu-22.04
    needs: [build-windows, build-linux]
    steps:
      - name: Download Windows bundles
        uses: actions/download-artifact@v4
        with:
          name: desktop-tauri-windows
          path: out/windows

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          name: desktop-tauri-linux
          path: out/linux

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          find out -type f -print0 | sort -z | xargs -0 sha256sum > desktop-tauri-sha256.txt
          cat desktop-tauri-sha256.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: desktop-tauri-checksums
          path: desktop-tauri-sha256.txt

  provenance:
    runs-on: ubuntu-22.04
    needs: [checksums]
    steps:
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: desktop-tauri-checksums
          path: out/provenance

      - name: Attest desktop checksum manifest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: out/provenance/desktop-tauri-sha256.txt
