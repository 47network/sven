name: flutter-user-app-device-farm

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/companion-user-flutter/**'
      - '.github/workflows/flutter-user-app-device-farm.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'apps/companion-user-flutter/**'
      - '.github/workflows/flutter-user-app-device-farm.yml'

jobs:
  android-maestro-cloud:
    runs-on: ubuntu-latest
    env:
      RUN_MAESTRO: ${{ secrets.MAESTRO_CLOUD_API_KEY != '' }}
      REQUIRE_MAESTRO: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Enforce cloud key on release refs
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO == 'true'
        run: |
          echo "MAESTRO_CLOUD_API_KEY is required for release refs (main/release/*/tags)."
          exit 1

      - name: Skip notice when cloud key missing
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO != 'true'
        run: |
          echo "MAESTRO_CLOUD_API_KEY is not configured; Android Flutter device-farm job skipped."
          echo "To enable: add MAESTRO_CLOUD_API_KEY to the repository secrets."
          echo "  1. Go to repo Settings > Secrets and variables > Actions"
          echo "  2. Add New repository secret: MAESTRO_CLOUD_API_KEY = <your-key>"
          echo "  3. Obtain key from https://cloud.mobile.dev"

      - name: Setup Flutter
        if: env.RUN_MAESTRO == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Setup Java
        if: env.RUN_MAESTRO == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter pub get
        if: env.RUN_MAESTRO == 'true'
        working-directory: apps/companion-user-flutter
        run: flutter pub get

      - name: Build Android debug APK
        if: env.RUN_MAESTRO == 'true'
        working-directory: apps/companion-user-flutter
        run: flutter build apk --debug

      - name: Install Maestro CLI
        if: env.RUN_MAESTRO == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Android Flutter device-farm smoke
        if: env.RUN_MAESTRO == 'true'
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
        run: |
          sh scripts/ops/mobile/maestro-cloud-run.sh \
            "$MAESTRO_CLOUD_API_KEY" \
            android \
            apps/companion-user-flutter/build/app/outputs/flutter-apk/app-debug.apk \
            apps/companion-user-flutter/.maestro/flows/android-smoke.yaml

      - name: Write Android device-farm execution status
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/device-farm-status"
          cat > "$RUNNER_TEMP/device-farm-status/android.json" <<'EOF'
          {
            "workflow": "flutter-user-app-device-farm",
            "platform": "android",
            "executed": "${{ env.RUN_MAESTRO }}",
            "required_for_ref": "${{ env.REQUIRE_MAESTRO }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload Android device-farm execution status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-user-app-device-farm-status-android
          path: ${{ runner.temp }}/device-farm-status/android.json
          if-no-files-found: error

  ios-maestro-cloud:
    runs-on: macos-14
    env:
      RUN_MAESTRO: ${{ secrets.MAESTRO_CLOUD_API_KEY != '' }}
      REQUIRE_MAESTRO: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Enforce cloud key on release refs
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO == 'true'
        run: |
          echo "MAESTRO_CLOUD_API_KEY is required for release refs (main/release/*/tags)."
          exit 1

      - name: Skip notice when cloud key missing
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO != 'true'
        run: echo "MAESTRO_CLOUD_API_KEY is not configured; iOS Flutter device-farm job skipped."

      - name: Setup Flutter
        if: env.RUN_MAESTRO == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Flutter pub get
        if: env.RUN_MAESTRO == 'true'
        working-directory: apps/companion-user-flutter
        run: flutter pub get

      - name: Build iOS debug app
        if: env.RUN_MAESTRO == 'true'
        working-directory: apps/companion-user-flutter
        run: |
          flutter build ios --debug --no-codesign --simulator
          APP_PATH="$(find build/ios/iphonesimulator -name '*.app' | head -n 1)"
          echo "IOS_APP_PATH=$(pwd)/$APP_PATH" >> "$GITHUB_ENV"

      - name: Install Maestro CLI
        if: env.RUN_MAESTRO == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run iOS Flutter device-farm smoke
        if: env.RUN_MAESTRO == 'true'
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
        run: |
          sh scripts/ops/mobile/maestro-cloud-run.sh \
            "$MAESTRO_CLOUD_API_KEY" \
            ios \
            "${{ env.IOS_APP_PATH }}" \
            apps/companion-user-flutter/.maestro/flows/ios-smoke.yaml

      - name: Write iOS device-farm execution status
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/device-farm-status"
          cat > "$RUNNER_TEMP/device-farm-status/ios.json" <<'EOF'
          {
            "workflow": "flutter-user-app-device-farm",
            "platform": "ios",
            "executed": "${{ env.RUN_MAESTRO }}",
            "required_for_ref": "${{ env.REQUIRE_MAESTRO }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload iOS device-farm execution status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-user-app-device-farm-status-ios
          path: ${{ runner.temp }}/device-farm-status/ios.json
          if-no-files-found: error
