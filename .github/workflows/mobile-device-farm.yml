name: mobile-device-farm
# DEPRECATED: legacy workflow kept for compatibility.
# Pathing is aligned with the active Flutter app to avoid stale companion-mobile drift.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/companion-user-flutter/**'
      - 'scripts/ops/mobile/maestro-cloud-run.sh'
      - '.github/workflows/mobile-device-farm.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'apps/companion-user-flutter/**'
      - 'scripts/ops/mobile/maestro-cloud-run.sh'
      - '.github/workflows/mobile-device-farm.yml'

jobs:
  android-maestro-cloud:
    runs-on: ubuntu-latest
    env:
      RUN_MAESTRO: ${{ secrets.MAESTRO_CLOUD_API_KEY != '' }}
      REQUIRE_MAESTRO: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Enforce cloud key on release refs
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO == 'true'
        run: |
          echo "MAESTRO_CLOUD_API_KEY is required for release refs (main/release/*/tags)."
          exit 1

      - name: Skip notice when cloud key missing
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO != 'true'
        run: echo "MAESTRO_CLOUD_API_KEY is not configured; Android device-farm job skipped."

      - name: Setup Node
        if: env.RUN_MAESTRO == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        if: env.RUN_MAESTRO == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        if: env.RUN_MAESTRO == 'true'
        run: npm ci

      - name: Build Android debug APK
        if: env.RUN_MAESTRO == 'true'
        working-directory: apps/companion-user-flutter
        run: |
          flutter --version
          flutter pub get
          flutter build apk --debug --flavor dev --target lib/main_dev.dart --dart-define=SVEN_ENV=dev --dart-define=SVEN_FLAVOR=dev

      - name: Install Maestro CLI
        if: env.RUN_MAESTRO == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Android device-farm smoke
        if: env.RUN_MAESTRO == 'true'
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
        run: |
          sh scripts/ops/mobile/maestro-cloud-run.sh \
            "$MAESTRO_CLOUD_API_KEY" \
            android \
            apps/companion-user-flutter/build/app/outputs/flutter-apk/app-dev-debug.apk \
            apps/companion-user-flutter/.maestro/flows/android-smoke.yaml

      - name: Write Android device-farm execution status
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/device-farm-status"
          cat > "$RUNNER_TEMP/device-farm-status/android.json" <<'EOF'
          {
            "workflow": "mobile-device-farm",
            "platform": "android",
            "executed": "${{ env.RUN_MAESTRO }}",
            "required_for_ref": "${{ env.REQUIRE_MAESTRO }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload Android device-farm execution status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-device-farm-status-android
          path: ${{ runner.temp }}/device-farm-status/android.json
          if-no-files-found: error

  ios-maestro-cloud:
    runs-on: macos-14
    env:
      RUN_MAESTRO: ${{ secrets.MAESTRO_CLOUD_API_KEY != '' }}
      REQUIRE_MAESTRO: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Enforce cloud key on release refs
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO == 'true'
        run: |
          echo "MAESTRO_CLOUD_API_KEY is required for release refs (main/release/*/tags)."
          exit 1

      - name: Skip notice when cloud key missing
        if: env.RUN_MAESTRO != 'true' && env.REQUIRE_MAESTRO != 'true'
        run: echo "MAESTRO_CLOUD_API_KEY is not configured; iOS device-farm job skipped."

      - name: Setup Node
        if: env.RUN_MAESTRO == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: env.RUN_MAESTRO == 'true'
        run: npm ci

      - name: Build iOS simulator app bundle
        if: env.RUN_MAESTRO == 'true'
        working-directory: apps/companion-user-flutter
        run: |
          flutter --version
          flutter pub get
          flutter build ios --debug --simulator --flavor dev --target lib/main_dev.dart --dart-define=SVEN_ENV=dev --dart-define=SVEN_FLAVOR=dev --no-codesign
          APP_PATH="$(find build/ios/iphonesimulator -name Runner.app -o -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app artifact found."
            exit 1
          fi
          echo "IOS_APP_PATH=$(cd "$(dirname "$APP_PATH")" && pwd)/$(basename "$APP_PATH")" >> "$GITHUB_ENV"

      - name: Install Maestro CLI
        if: env.RUN_MAESTRO == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run iOS device-farm smoke
        if: env.RUN_MAESTRO == 'true'
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
        run: |
          sh scripts/ops/mobile/maestro-cloud-run.sh \
            "$MAESTRO_CLOUD_API_KEY" \
            ios \
            "${{ env.IOS_APP_PATH }}" \
            apps/companion-user-flutter/.maestro/flows/ios-smoke.yaml

      - name: Write iOS device-farm execution status
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/device-farm-status"
          cat > "$RUNNER_TEMP/device-farm-status/ios.json" <<'EOF'
          {
            "workflow": "mobile-device-farm",
            "platform": "ios",
            "executed": "${{ env.RUN_MAESTRO }}",
            "required_for_ref": "${{ env.REQUIRE_MAESTRO }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload iOS device-farm execution status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-device-farm-status-ios
          path: ${{ runner.temp }}/device-farm-status/ios.json
          if-no-files-found: error
