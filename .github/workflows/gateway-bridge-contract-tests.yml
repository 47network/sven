name: gateway-bridge-contract-tests

on:
  pull_request:
    paths:
      - 'services/gateway-api/**'
      - 'services/bridge-47dynamics/**'
      - 'services/rag-indexer/**'
      - '.github/workflows/gateway-bridge-contract-tests.yml'
  push:
    branches:
      - thesven
      - main
    paths:
      - 'services/gateway-api/**'
      - 'services/bridge-47dynamics/**'
      - 'services/rag-indexer/**'
      - '.github/workflows/gateway-bridge-contract-tests.yml'
  workflow_dispatch:
    inputs:
      runner_target:
        description: 'Runner target for manual execution'
        required: false
        default: 'self-hosted'
        type: choice
        options:
          - self-hosted
          - github-hosted

jobs:
  gateway-bridge-contract-self-hosted:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner_target == 'self-hosted' }}
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/gateway-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/**/package-lock.json

      - name: Install gateway dependencies
        run: npm install

      - name: Run gateway bridge contract tests
        run: >
          npm test -- --runTestsByPath
          src/__tests__/admin-bridge-tenant-mappings-registration.contract.test.ts
          src/__tests__/admin-bridge-tenant-mappings-health.contract.test.ts
          src/__tests__/bridge-correlation-routing.contract.test.ts
          src/__tests__/bridge-strict-mode-env-alias.contract.test.ts
          src/__tests__/gateway-bridge-workflow-coverage.contract.test.ts
          src/__tests__/rag-indexer-query-path.contract.test.ts
          src/__tests__/release-required-workflows-bridge-gates.contract.test.ts
          src/__tests__/final-signoff-bridge-ci-lanes.contract.test.ts
          src/__tests__/bridge-ci-lanes-check-script.contract.test.ts

  gateway-bridge-contract-github-hosted:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runner_target == 'github-hosted' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/gateway-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/**/package-lock.json

      - name: Install gateway dependencies
        run: npm install

      - name: Run gateway bridge contract tests
        run: >
          npm test -- --runTestsByPath
          src/__tests__/admin-bridge-tenant-mappings-registration.contract.test.ts
          src/__tests__/admin-bridge-tenant-mappings-health.contract.test.ts
          src/__tests__/bridge-correlation-routing.contract.test.ts
          src/__tests__/bridge-strict-mode-env-alias.contract.test.ts
          src/__tests__/gateway-bridge-workflow-coverage.contract.test.ts
          src/__tests__/rag-indexer-query-path.contract.test.ts
          src/__tests__/release-required-workflows-bridge-gates.contract.test.ts
          src/__tests__/final-signoff-bridge-ci-lanes.contract.test.ts
          src/__tests__/bridge-ci-lanes-check-script.contract.test.ts
