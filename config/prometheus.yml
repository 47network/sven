global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sven-prod'
    environment: 'local'

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway-api'
    static_configs:
      - targets: ['gateway-api:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'agent-runtime'
    dns_sd_configs:
      - names: ['agent-runtime']
        port: 9100
    scrape_interval: 10s

  - job_name: 'skill-runner'
    dns_sd_configs:
      - names: ['skill-runner']
        port: 9100
    scrape_interval: 10s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: '/metrics'
    scrape_interval: 10s
