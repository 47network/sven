# Sven internal ingress (HTTP only) for deployment behind edge proxy/LB.
# This file is proxy-layer only. It does not terminate TLS.
#
# Typical deployment:
# - external proxy forwards:
#   - https://sven.47matrix.online:44747 -> http://<sven-host>:8088
#   - https://sven.glyph.47matrix.online:44747 -> http://<sven-host>:8088
# - this internal ingress handles installers and app routing.
#
# Service targets on Sven host:
# - gateway-api: 127.0.0.1:3000
# - admin-ui:    127.0.0.1:3100
# - canvas-ui:   127.0.0.1:3200
#
# Admin lockdown policy can be enforced here with include files under:
# /etc/nginx/conf.d/sven-admin47-access/*.conf

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sven_gateway_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream sven_admin_ui {
    server 127.0.0.1:3100;
    keepalive 16;
}

upstream sven_canvas_ui {
    server 127.0.0.1:3200;
    keepalive 16;
}

# Installer host: serves one-liner installers, landing page, and suite.
server {
    listen 8088;
    listen [::]:8088;
    server_name sven.47matrix.online;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Directory expected to contain:
    # - index.html
    # - install.sh
    # - install.ps1
    # - install.cmd
    root /opt/sven/quickstart;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /suite {
        try_files /suite/index.html =404;
    }

    location /suite/ {
        try_files $uri $uri/ $uri.html /suite/index.html =404;
    }

    location = /install.sh {
        default_type text/plain;
        try_files /install.sh =404;
    }

    location = /install.ps1 {
        default_type text/plain;
        try_files /install.ps1 =404;
    }

    location = /install.cmd {
        default_type text/plain;
        try_files /install.cmd =404;
    }

    # Keep installer host focused on installer surface only.
    location / {
        return 404;
    }
}

# App host: API/admin/canvas routing.
server {
    listen 8088;
    listen [::]:8088;
    server_name sven.glyph.47matrix.online _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API routes
    location = /v1/admin/events {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cache-Control "no-cache";
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_pass http://sven_gateway_api/v1/admin/events;
    }

    location ^~ /v1/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://sven_gateway_api;
    }

    location = /healthz {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_gateway_api/healthz;
    }

    location = /readyz {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_gateway_api/readyz;
    }

    location = /manifest.json {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_canvas_ui/manifest.json;
    }

    # Legacy Canvas path redirects
    location = /canvas {
        return 301 /;
    }

    location = /canvas/ {
        return 301 /;
    }

    location ~ ^/canvas/(.*)$ {
        return 301 /$1;
    }

    # Admin UI under /admin47. Optional local IP/VPN lockdown include.
    location = /admin47/ {
        return 301 /admin47;
    }

    location ^~ /admin47 {
        include /etc/nginx/conf.d/sven-admin47-access/*.conf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://sven_admin_ui;
    }

    # Canvas as primary root UX.
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://sven_canvas_ui;
    }
}
