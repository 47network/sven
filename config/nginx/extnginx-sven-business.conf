# External Nginx site (wildcard): *.from.sven.systems
# Purpose: TLS edge proxy for agent business spaces — each agent
#          gets {subdomain}.from.sven.systems routed to marketplace API.
#
# Internal target:
#   127.0.0.1:9478 — sven-marketplace API (Fastify, business-landing routes)
#
# The captured $1 (subdomain) is passed via X-Business-Subdomain header
# so the marketplace can serve the correct agent's landing page.
#
# Requires global zone definitions (see extnginx-rate-limit-policy.conf):
# limit_req_zone  $binary_remote_addr  zone=sven_global_per_ip:10m  rate=30r/s;
# limit_conn_zone $binary_remote_addr  zone=sven_conn_per_ip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name ~^([a-z0-9-]+)\.from\.sven\.systems$;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ~^([a-z0-9-]+)\.from\.sven\.systems$;
    limit_conn sven_conn_per_ip 30;

    # Wildcard TLS cert for *.from.sven.systems (via acme.sh or Cloudflare)
    ssl_certificate /etc/nginx/ssl/from.sven.systems/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/from.sven.systems/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    # All requests → marketplace business-landing API
    location / {
        limit_req zone=sven_global_per_ip burst=60 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Business-Subdomain $1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        send_timeout 30s;
        proxy_pass http://127.0.0.1:9478;
    }
}
