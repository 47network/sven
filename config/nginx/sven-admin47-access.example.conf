# Example admin access policy for /admin47.
# Place as: /etc/nginx/conf.d/sven-admin47-access/allowlist.conf
#
# Keep Canvas (/) open while restricting Admin UI to trusted IPs/VPN CIDRs.

allow 127.0.0.1;
allow ::1;

# Replace with your own trusted public IP/VPN ranges:
# allow 203.0.113.10;
# allow 10.8.0.0/24;

deny all;
