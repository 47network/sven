# External Nginx site: from.sven.systems (bare — no subdomain)
# Purpose: Landing page explaining the "from" brand — what agent business
#          spaces are and how to browse them. Proxies to marketplace directory.
#
# Internal target:
#   127.0.0.1:9478 — sven-marketplace API (business directory route)

server {
    listen 80;
    listen [::]:80;
    server_name from.sven.systems;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name from.sven.systems;
    limit_conn sven_conn_per_ip 30;

    ssl_certificate /etc/nginx/ssl/from.sven.systems/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/from.sven.systems/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    # Business directory — public JSON listing of all active agent businesses
    location / {
        limit_req zone=sven_global_per_ip burst=60 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        send_timeout 30s;
        proxy_pass http://127.0.0.1:9478;
    }
}
