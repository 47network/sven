server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;

  location = /install.sh {
    default_type text/plain;
    try_files /install.sh =404;
  }

  location = /install.ps1 {
    default_type text/plain;
    try_files /install.ps1 =404;
  }

  location = /install.cmd {
    default_type text/plain;
    try_files /install.cmd =404;
  }

  location = /suite {
    try_files /suite/index.html =404;
  }

  location /suite/ {
    try_files $uri $uri/ $uri.html /suite/index.html =404;
  }

  location = / {
    try_files /index.html =404;
  }
}
