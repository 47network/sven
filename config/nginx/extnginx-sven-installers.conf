# External Nginx site: sven.systems
# Purpose: thin TLS edge proxy to internal Sven ingress.
#
# Internal Sven ingress target:
# - sven-internal-ingress: 192.168.7.59:8088

server {
    listen 80;
    listen [::]:80;
    server_name sven.systems;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    location / {
        return 301 https://$host:44747$request_uri;
    }
}

server {
    listen 44747 ssl;
    listen [::]:44747 ssl;
    server_name sven.systems;
    limit_conn sven_conn_per_ip 30;

    ssl_certificate /etc/nginx/ssl/sven.systems_P256/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/sven.systems_P256/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    # External Nginx remains thin: installer routing/headers are handled
    # by internal Sven ingress on :8088.
    location / {
        limit_req zone=sven_global_per_ip burst=120 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 44747;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
        proxy_pass http://192.168.7.59:8088;
    }
}
