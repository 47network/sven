# External Nginx site (app host): app.sven.systems
# Purpose: thin TLS edge proxy to internal Sven ingress.
#
# Internal Sven ingress target:
# - sven-internal-ingress: 192.168.7.59:8088
#
# Requires global zone definitions in nginx http{} context:
# limit_req_zone  $binary_remote_addr  zone=sven_global_per_ip:10m  rate=30r/s;
# limit_req_zone  $binary_remote_addr  zone=sven_auth_per_ip:10m    rate=10r/m;
# limit_conn_zone $binary_remote_addr  zone=sven_conn_per_ip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name app.sven.systems;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    location / {
        return 301 https://$host:44747$request_uri;
    }
}

server {
    listen 44747 ssl;
    listen [::]:44747 ssl;
    server_name app.sven.systems;
    limit_conn sven_conn_per_ip 30;

    ssl_certificate /etc/nginx/ssl/app.sven.systems_P256/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/app.sven.systems_P256/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    server_tokens off;

    # Baseline response hardening for browser surfaces.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    # External Nginx remains thin: all app path routing/redirects are handled
    # by internal Sven ingress on :8088.
    location / {
        limit_req zone=sven_global_per_ip burst=120 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 44747;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
        proxy_pass http://192.168.7.59:8088;
    }
}
