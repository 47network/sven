# Sven public ingress
# Domains:
# - sven.47matrix.online           (static release host: landing, suite, installers)
# - sven.glyph.47matrix.online     (runtime host: app/ui/api)
#
# Expected local listeners:
# - gateway-api: 127.0.0.1:3000
# - admin-ui:    127.0.0.1:3002 (optional, if deployed)
# - canvas-ui:   127.0.0.1:3003 (optional, if deployed)

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

limit_req_zone $binary_remote_addr zone=install_rl:10m rate=30r/m;

upstream sven_gateway {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream sven_admin_ui {
  server 127.0.0.1:3002;
  keepalive 16;
}

upstream sven_canvas_ui {
  server 127.0.0.1:3003;
  keepalive 16;
}

server {
  listen 80;
  server_name sven.47matrix.online sven.glyph.47matrix.online;
  return 301 https://$host:44747$request_uri;
}

server {
  listen 44747 ssl http2;
  server_name sven.47matrix.online;

  # Replace with your cert paths (Certbot/ACME)
  ssl_certificate /etc/letsencrypt/live/sven.47matrix.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sven.47matrix.online/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;

  # Host installer artifacts from local filesystem.
  root /opt/sven/quickstart;
  index index.html;

  # Optional landing page.
  location = / {
    try_files /index.html =404;
  }

  # Sven landing suite pages.
  location = /suite {
    try_files /suite/index.html =404;
  }

  location = /suite/ {
    try_files /suite/index.html =404;
  }

  location ~ ^/suite/(platform|features|security|docs|enterprise|roadmap)$ {
    try_files /suite/$1.html =404;
  }

  location ^~ /suite/assets/ {
    try_files $uri =404;
  }

  location ^~ /docs {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_pass http://sven_canvas_ui;
  }

  location ^~ /marketplace {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_pass http://sven_canvas_ui;
  }

  location ~ ^/(login|privacy|terms)$ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_pass http://sven_canvas_ui;
  }

  location = /install.sh {
    default_type text/plain;
    limit_req zone=install_rl burst=20 nodelay;
    try_files /install.sh =404;
  }

  location = /install.ps1 {
    default_type text/plain;
    limit_req zone=install_rl burst=20 nodelay;
    try_files /install.ps1 =404;
  }

  location = /install.cmd {
    default_type text/plain;
    limit_req zone=install_rl burst=20 nodelay;
    try_files /install.cmd =404;
  }

  location / {
    return 404;
  }
}

server {
  listen 44747 ssl http2;
  server_name sven.glyph.47matrix.online;

  # Replace with your cert paths (Certbot/ACME)
  ssl_certificate /etc/letsencrypt/live/sven.glyph.47matrix.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sven.glyph.47matrix.online/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  # API + health + stream routes -> gateway-api
  location /v1/ {
    proxy_pass http://sven_gateway;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /healthz {
    proxy_pass http://sven_gateway/healthz;
  }

  location = /readyz {
    proxy_pass http://sven_gateway/readyz;
  }

  # Legacy canvas path redirect.
  location = /canvas {
    return 301 /;
  }

  location = /canvas/ {
    return 301 /;
  }

  location ~ ^/canvas/(.*)$ {
    return 301 /$1;
  }

  location ^~ /admin47 {
    proxy_pass http://sven_admin_ui;
  }

  location / {
    proxy_pass http://sven_canvas_ui;
  }
}
