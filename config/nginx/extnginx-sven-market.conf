# External Nginx site (marketplace host): market.sven.systems
# Purpose: thin TLS edge proxy to internal Sven marketplace-ui + marketplace API.
#
# Internal targets:
#   127.0.0.1:3310 — marketplace-ui (Next.js, PM2)
#   127.0.0.1:9478 — sven-marketplace API (Fastify)
#
# Requires global zone definitions in nginx http{} context (see extnginx-rate-limit-policy.conf):
# limit_req_zone  $binary_remote_addr  zone=sven_global_per_ip:10m  rate=30r/s;
# limit_conn_zone $binary_remote_addr  zone=sven_conn_per_ip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name market.sven.systems;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name market.sven.systems;
    limit_conn sven_conn_per_ip 30;

    ssl_certificate /etc/nginx/ssl/market.sven.systems/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/market.sven.systems/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    # Marketplace API (sven-marketplace, port 9478)
    location /v1/market/ {
        limit_req zone=sven_global_per_ip burst=60 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        send_timeout 30s;
        proxy_pass http://127.0.0.1:9478;
    }

    # Next.js marketplace-ui
    location / {
        limit_req zone=sven_global_per_ip burst=120 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
        proxy_pass http://127.0.0.1:3310;
    }
}
