# Sven internal ingress running inside Docker.
# Exposes port 8088 and routes installer + app traffic.
#
# Upstreams:
# - gateway-api via docker service name
# - admin-ui/canvas-ui via host ports through host.docker.internal

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sven_gateway_api {
    server gateway-api:3000;
    keepalive 32;
}

upstream sven_admin_ui {
    server host.docker.internal:3100;
    keepalive 16;
}

upstream sven_canvas_ui {
    server host.docker.internal:3200;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name sven.47matrix.online;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /suite {
        try_files /suite/index.html =404;
    }

    location /suite/ {
        try_files $uri $uri/ $uri.html /suite/index.html =404;
    }

    location = /install.sh {
        default_type text/plain;
        try_files /install.sh =404;
    }

    location = /install.ps1 {
        default_type text/plain;
        try_files /install.ps1 =404;
    }

    location = /install.cmd {
        default_type text/plain;
        try_files /install.cmd =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name sven.glyph.47matrix.online _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /v1/admin/events {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cache-Control "no-cache";
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_pass http://sven_gateway_api/v1/admin/events;
    }

    location ^~ /v1/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://sven_gateway_api;
    }

    location = /healthz {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_gateway_api/healthz;
    }

    location = /readyz {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_gateway_api/readyz;
    }

    location = /manifest.json {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass http://sven_canvas_ui/manifest.json;
    }

    location = /canvas {
        return 301 /;
    }

    location = /canvas/ {
        return 301 /;
    }

    location ~ ^/canvas/(.*)$ {
        return 301 /$1;
    }

    location = /admin47/ {
        return 301 /admin47;
    }

    location ^~ /admin47 {
        include /etc/nginx/conf.d/sven-admin47-access/*.conf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://sven_admin_ui;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://sven_canvas_ui;
    }
}
