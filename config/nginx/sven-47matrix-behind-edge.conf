# Sven internal ingress behind an edge reverse proxy that already terminates TLS.
# Edge proxy host routes:
# - sven.47matrix.online -> this server:8088      (static release host)
# - sven.glyph.47matrix.online -> this server:8088 (runtime host)
#
# This file intentionally uses HTTP only (no cert config here).

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

limit_req_zone $binary_remote_addr zone=install_rl:10m rate=30r/m;

upstream sven_gateway {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream sven_admin_ui {
  server 127.0.0.1:3002;
  keepalive 16;
}

upstream sven_canvas_ui {
  server 127.0.0.1:3003;
  keepalive 16;
}

server {
  listen 8088;
  server_name sven.47matrix.online sven.glyph.47matrix.online;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # one-liner installers
  if ($host = sven.47matrix.online) {
    set $is_installer_host 1;
  }

  root /opt/sven/quickstart;
  index index.html;

  location = / {
    if ($host = sven.47matrix.online) {
      try_files /index.html =404;
      break;
    }
    proxy_pass http://sven_canvas_ui;
  }

  location = /suite {
    if ($host != sven.47matrix.online) { return 404; }
    try_files /suite/index.html =404;
  }

  location /suite/ {
    if ($host != sven.47matrix.online) { return 404; }
    try_files $uri $uri/ $uri.html /suite/index.html =404;
  }

  location = /install.sh {
    if ($host != sven.47matrix.online) { return 404; }
    default_type text/plain;
    limit_req zone=install_rl burst=20 nodelay;
    try_files /install.sh =404;
  }

  location = /install.ps1 {
    if ($host != sven.47matrix.online) { return 404; }
    default_type text/plain;
    limit_req zone=install_rl burst=20 nodelay;
    try_files /install.ps1 =404;
  }

  location = /install.cmd {
    if ($host != sven.47matrix.online) { return 404; }
    default_type text/plain;
    limit_req zone=install_rl burst=20 nodelay;
    try_files /install.cmd =404;
  }

  # app/api host
  location /v1/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://sven_gateway;
  }

  location = /healthz {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_pass http://sven_gateway/healthz;
  }

  location = /readyz {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_pass http://sven_gateway/readyz;
  }

  location / {
    if ($host = sven.47matrix.online) {
      return 404;
    }
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_pass http://sven_canvas_ui;
  }

  location ^~ /admin47 {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_pass http://sven_admin_ui;
  }
}
