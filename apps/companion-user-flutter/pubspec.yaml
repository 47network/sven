name: sven_user_flutter
description: Sven user app (mobile + web) built with Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  connectivity_plus: ^6.0.5
  app_links: ^6.3.2
  http: ^1.2.2
  dio: ^5.7.0
  get_it: ^8.0.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.0
  drift: ^2.31.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.41
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.2
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  flutter_markdown: ^0.7.7+1
  markdown: ^7.2.2
  battery_plus: ^7.0.0
  device_info_plus: 11.3.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  flutter_math_fork: ^0.7.2
  file_picker: ^8.1.6
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  just_audio: ^0.10.4
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.1
  local_auth: ^2.3.0
  sentry_flutter: ^8.14.2
  dynamic_color: ^1.7.0
  firebase_analytics: ^11.3.3
  retry: ^3.1.2
  share_plus: ^10.1.4
  timezone: ^0.9.4
  google_fonts: ^6.2.1
  webview_flutter: ^4.10.0
  flutter_svg: ^2.0.10+1
  wakelock_plus: ^1.2.0
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  desktop_drop: ^0.4.4
  window_manager: ^0.4.0
  tray_manager: ^0.2.3
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  flutter_web_auth_2: ^4.0.1
  crypto: ^3.0.3
  lottie: ^3.1.2
  home_widget: ^0.9.0
  proximity_sensor: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.9
  flutter_gen_runner: ^5.8.0
  # drift_dev omitted: conflicts with freezed over build pkg version; .g.dart written manually
  widgetbook: ^3.0.0
  patrol: ^4.0.0

dependency_overrides:

# ── flutter_gen configuration ─────────────────────────────────────────────────
# Generates lib/gen/assets.gen.dart with type-safe asset accessors.
# Usage:  Assets.images.svenLogo.svg(width: 80)
#         Assets.icons.icVoice.svg(color: Colors.white)
flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/tray/
    - assets/lottie/

  shaders:
    - shaders/entity.frag

patrol:
  test_directory: integration_test
