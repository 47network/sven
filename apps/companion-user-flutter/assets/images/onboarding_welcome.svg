<!-- Onboarding page 1 — "Meet Sven" — concentric aura rings around the orb -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
    <defs>
        <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#040712" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="orbG1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00D9FF"/>
            <stop offset="100%" stop-color="#00FFA3"/>
        </linearGradient>
        <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Background radial glow -->
    <ellipse cx="160" cy="120" rx="150" ry="110" fill="url(#bg1)"/>
    <!-- Aura rings -->
    <circle cx="160" cy="120" r="110" fill="none" stroke="#00D9FF" stroke-width="0.6" opacity="0.12"/>
    <circle cx="160" cy="120" r="90" fill="none" stroke="#00D9FF" stroke-width="0.8" opacity="0.18"/>
    <circle cx="160" cy="120" r="70" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.25"/>
    <circle cx="160" cy="120" r="52" fill="none" stroke="#00FFA3" stroke-width="1.2" opacity="0.3"/>
    <!-- Orb glow -->
    <circle cx="160" cy="120" r="40" fill="url(#orbG1)" opacity="0.25" filter="url(#glow1)"/>
    <!-- Orb -->
    <circle cx="160" cy="120" r="36" fill="url(#orbG1)"/>
    <!-- Lettermark -->
    <text x="160" y="134" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" text-anchor="middle" fill="#040712" letter-spacing="-2">S</text>
    <!-- Floating particles -->
    <circle cx="88" cy="68" r="2.5" fill="#00D9FF" opacity="0.55"/>
    <circle cx="240" cy="72" r="2" fill="#00FFA3" opacity="0.45"/>
    <circle cx="72" cy="158" r="1.8" fill="#00D9FF" opacity="0.4"/>
    <circle cx="254" cy="162" r="2.2" fill="#00FFA3" opacity="0.5"/>
    <circle cx="130" cy="42" r="1.5" fill="#00D9FF" opacity="0.35"/>
    <circle cx="204" cy="196" r="1.8" fill="#00FFA3" opacity="0.4"/>
</svg>
