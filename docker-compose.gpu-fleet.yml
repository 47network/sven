# docker-compose.gpu-fleet.yml
# ─────────────────────────────────────────────────────────────────────────────
# GPU fleet compose overlay for Sven local model inference.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu-fleet.yml up
#
# This overlay adds:
#   - ollama-vm13: Ollama on VM13 (NVIDIA RTX 3060, 12 GiB)
#   - llama-server-vm5: llama.cpp server on VM5 (AMD RX 9070 XT + RX 6750 XT, 28 GiB)
#   - Model volume mounts for persistent storage
#   - GPU passthrough configs per runtime
#
# NOTE: Each node should run on the appropriate host with GPU hardware.
#       When deploying multi-VM, use separate compose stacks per host
#       and point SVEN_LLM_ENDPOINT / SVEN_LLM_POWER_ENDPOINT to the
#       remote node addresses.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Ollama on NVIDIA node (VM13 / kaldorei) ───────────────────────────
  ollama-vm13:
    image: ollama/ollama@sha256:0ff452f6a4c3c5bb4ab063a1db190b261d5834741a519189ed5301d50e4434d1
    container_name: sven-ollama-vm13
    restart: unless-stopped
    ports:
      - "${SVEN_OLLAMA_VM13_PORT:-11434}:11434"
    volumes:
      - ollama-vm13-models:/root/.ollama
    networks:
      - core
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── llama.cpp server on ROCm node (VM5 / sven-ai) ────────────────────
  # AMD RX 9070 XT (16 GiB) + RX 6750 XT (12 GiB) = ~28 GiB VRAM
  # Uses ROCm/HIP for GPU acceleration.
  llama-server-vm5:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: sven-llama-server-vm5
    restart: unless-stopped
    ports:
      - "${SVEN_LLAMA_VM5_PORT:-8080}:8080"
    volumes:
      - llama-vm5-models:/models
    networks:
      - core
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/${SVEN_LLAMA_VM5_MODEL:-qwen2.5-coder-32b-instruct-q4_k_m.gguf}"
      - "--n-gpu-layers"
      - "${SVEN_LLAMA_VM5_GPU_LAYERS:-99}"
      - "--ctx-size"
      - "${SVEN_LLAMA_VM5_CTX:-8192}"
      - "--parallel"
      - "${SVEN_LLAMA_VM5_PARALLEL:-2}"
      - "--flash-attn"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Wire fleet env into gateway-api ────────────────────────────────────
  gateway-api:
    environment:
      - SVEN_LLM_ENDPOINT=${SVEN_LLM_ENDPOINT:-http://ollama-vm13:11434}
      - SVEN_LLM_POWER_ENDPOINT=${SVEN_LLM_POWER_ENDPOINT:-http://llama-server-vm5:8080}
      - SVEN_LLM_MODEL=${SVEN_LLM_MODEL:-qwen2.5:7b}
      - SVEN_LLM_POWER_MODEL=${SVEN_LLM_POWER_MODEL:-qwen2.5-coder:32b}

volumes:
  ollama-vm13-models:
    name: sven-ollama-vm13-models
  llama-vm5-models:
    name: sven-llama-vm5-models
