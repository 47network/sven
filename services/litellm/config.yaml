# ─────────────────────────────────────────────────────────────────────────────
# LiteLLM Proxy Configuration for Sven
# Docs: https://docs.litellm.ai/docs/proxy/configs
# ─────────────────────────────────────────────────────────────────────────────

model_list:
  # ── Local Models (Ollama — dual AMD GPU) ─────────────────────────────────
  # GPU 0: RX 9070 XT (15.9 GiB, gfx1201) — port 11434 — primary/large
  #   Models: qwen2.5:14b, deepseek-r1:14b, llama3.2:3b
  # GPU 1: RX 6700  (12.0 GiB, gfx1031)  — port 11435 — fast/concurrent
  #   Models: qwen2.5:7b, llama3.2:3b
  #
  # Best all-round local model — qwen2.5:14b on 9070 XT
  - model_name: qwen2.5:14b
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://sven-ollama-9070:11434

  # Reasoning/thinking model — deepseek-r1:14b on 9070 XT
  - model_name: deepseek-r1:14b
    litellm_params:
      model: ollama/deepseek-r1:14b
      api_base: http://sven-ollama-9070:11434

  # Fast local model — qwen2.5:7b on 6700
  - model_name: qwen2.5:7b
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://sven-ollama-6700:11434

  # Wildcard routes
  - model_name: ollama/*
    litellm_params:
      model: ollama/*
      api_base: http://sven-ollama-9070:11434

  - model_name: ollama-fast/*
    litellm_params:
      model: ollama/*
      api_base: http://sven-ollama-6700:11434

  # Load-balanced wildcard — spreads across both GPUs
  - model_name: ollama-balanced/*
    litellm_params:
      model: ollama/*
      api_base: http://sven-ollama-9070:11434
  - model_name: ollama-balanced/*
    litellm_params:
      model: ollama/*
      api_base: http://sven-ollama-6700:11434

  # Explicit bare names used by agent-runtime
  - model_name: llama3.2:3b
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://sven-ollama-9070:11434

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://sven-ollama-9070:11434

  # ── OpenAI ───────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY

  # ── Anthropic ────────────────────────────────────────────────────────────
  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-3-5-haiku-20241022
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Google ───────────────────────────────────────────────────────────────
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY

  # ── GitHub Copilot API (Pro / Pro+ subscription) ──────────────────────────
  # Requires: GitHub PAT with `copilot` OAuth scope.
  # Pro+ gives access to Claude Opus 4.6, o3-mini (Codex), gpt-4o via Copilot.
  # Get token: https://github.com/settings/tokens → scope: `copilot`
  # Available model IDs: GET https://api.githubcopilot.com/models
  - model_name: copilot-claude-opus-4
    litellm_params:
      model: openai/claude-opus-4          # model ID as returned by /models
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-claude-sonnet-4-5
    litellm_params:
      model: openai/claude-sonnet-4-5
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-o3-mini
    litellm_params:
      model: openai/o3-mini                # Codex reasoning — Pro+ only
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  # ── GitHub Models API (azure AI inference, included with any GitHub account)
  # Less quota than Copilot API but no extra token scope needed.
  # Endpoint: https://models.inference.ai.azure.com
  # Auth: any GitHub PAT (classic or fine-grained, no special scope needed)
  - model_name: github-gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_base: https://models.inference.ai.azure.com
      api_key: os.environ/GITHUB_TOKEN

  - model_name: github-llama-3-3-70b
    litellm_params:
      model: azure/Meta-Llama-3.3-70B-Instruct
      api_base: https://models.inference.ai.azure.com
      api_key: os.environ/GITHUB_TOKEN

  # ── Mistral ──────────────────────────────────────────────────────────────
  - model_name: mistral-large-latest
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ── Routers ──────────────────────────────────────────────────────────────
  # `coding` — best model for code generation / debugging.
  # Local first: qwen2.5:14b on 9070 XT (9 GB, 176+ tok/s), then cloud.
  - model_name: coding
    litellm_params:
      model: qwen2.5:14b
      fallbacks: ["copilot-claude-opus-4", "gemini-2.5-pro", "gpt-4.1"]

  # `coding-fast` — speed-optimised for small coding tasks.
  # Local first: qwen2.5:7b on 6700 (concurrent GPU), then cloud.
  - model_name: coding-fast
    litellm_params:
      model: qwen2.5:7b
      fallbacks: ["copilot-o3-mini", "gemini-2.5-flash", "gpt-4o-mini"]

  # `reasoning` — deep reasoning / multi-step planning.
  # Local first: deepseek-r1:14b on 9070 XT (chain-of-thought native), then cloud.
  - model_name: reasoning
    litellm_params:
      model: deepseek-r1:14b
      fallbacks: ["copilot-o3-mini", "gemini-2.5-pro", "claude-sonnet-4-20250514"]

  # `local` — always use best local GPU model, never cloud.
  - model_name: local
    litellm_params:
      model: qwen2.5:14b
      api_base: http://sven-ollama-9070:11434

  # `local-fast` — always use fast local GPU model, never cloud.
  - model_name: local-fast
    litellm_params:
      model: qwen2.5:7b
      api_base: http://sven-ollama-6700:11434

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 2
  request_timeout: 120
  max_budget: 100.0
  budget_duration: monthly

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  alerting:
    - slack
  alerting_threshold: 300
