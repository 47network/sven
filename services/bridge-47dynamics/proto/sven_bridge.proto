syntax = "proto3";

package fortyseven.sven.bridge.v1;

option go_package = "github.com/47network/47dynamics/api-go/internal/svenbridge/pb";

// SvenBridge defines the gRPC contract between 47Dynamics (client) and
// TheSven AI platform (server). All AI processing that was previously handled
// by the 47Dynamics Python AI service is delegated to TheSven through this
// service, which runs as an isolated "legacy" tenant on the TheSven platform.
//
// Transport: mTLS-authenticated gRPC over HTTP/2.
// Auth: Keycloak service-account client_credentials + per-call tenant_id header.
// Tenant isolation: 47Dynamics operates as org "47dynamics-legacy" on TheSven,
// with data fully isolated via TheSven's multi-tenancy model.
service SvenBridge {
  // CopilotAsk sends a RAG-augmented question to TheSven's agent runtime.
  // Replaces the direct call to the Python AI service at POST /copilot/ask.
  rpc CopilotAsk(CopilotAskRequest) returns (CopilotAskResponse);

  // CopilotAskStream returns a streaming response for real-time token delivery.
  rpc CopilotAskStream(CopilotAskRequest) returns (stream CopilotStreamChunk);

  // SubmitAction proposes an AI-generated action for human-in-the-loop approval.
  rpc SubmitAction(SubmitActionRequest) returns (SubmitActionResponse);

  // GetActionStatus retrieves the current status of a submitted action.
  rpc GetActionStatus(GetActionStatusRequest) returns (ActionStatusResponse);

  // EdgeSummarize generates a summary using a CPU-quantized model,
  // suitable for gateway/edge deployments.
  rpc EdgeSummarize(EdgeSummarizeRequest) returns (EdgeSummarizeResponse);

  // IndexDomainKnowledge requests TheSven's RAG pipeline to index
  // 47Dynamics domain data (device docs, patch catalogs, KB articles, etc.).
  rpc IndexDomainKnowledge(IndexDomainKnowledgeRequest) returns (IndexDomainKnowledgeResponse);

  // RunbookSuggest returns runbook recommendations for a given alert type
  // using TheSven's RAG retrieval over indexed runbook content.
  rpc RunbookSuggest(RunbookSuggestRequest) returns (RunbookSuggestResponse);

  // HealthCheck verifies TheSven AI backend is reachable and operational.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ─── Common ────────────────────────────────────────────────────────────────────

// TenantContext is included in every request for tenant isolation.
message TenantContext {
  // 47Dynamics tenant UUID — mapped to a sub-scope within the
  // 47dynamics-legacy organization on TheSven.
  string tenant_id = 1;
  // Correlation ID for distributed tracing (propagated to OTel).
  string correlation_id = 2;
}

// ─── CopilotAsk ────────────────────────────────────────────────────────────────

message CopilotAskRequest {
  TenantContext tenant = 1;
  // The user's natural-language question (max 4000 chars enforced client-side).
  string question = 2;
  // Optional device UUIDs for context enrichment (max 50).
  repeated string context_device_ids = 3;
  // Optional alert UUIDs for context enrichment (max 50).
  repeated string context_alert_ids = 4;
  // Pre-enriched operational context from 47Dynamics API (device summaries,
  // alert summaries, ticket counts) — avoids TheSven needing direct DB access.
  OperationalContext operational_context = 5;
}

message OperationalContext {
  DeviceSummary device_summary = 1;
  AlertSummary alert_summary = 2;
  TicketSummary ticket_summary = 3;
  repeated DeviceDetail context_devices = 4;
}

message DeviceSummary {
  int32 total = 1;
  int32 online = 2;
  int32 offline = 3;
}

message AlertSummary {
  int32 open_24h = 1;
  int32 critical = 2;
  int32 high = 3;
}

message TicketSummary {
  int32 open = 1;
}

message DeviceDetail {
  string hostname = 1;
  string os = 2;
  string status = 3;
  string last_seen = 4; // RFC3339
}

message CopilotAskResponse {
  // The AI-generated answer.
  string answer = 1;
  // Source document references used for the answer.
  repeated string sources = 2;
  // Suggested follow-up actions the operator can take.
  repeated SuggestedAction suggested_actions = 3;
  // Model that generated the response (for audit).
  string model_used = 4;
  // Token counts for billing/budgeting.
  int32 prompt_tokens = 5;
  int32 completion_tokens = 6;
}

message SuggestedAction {
  string label = 1;
  string action_type = 2;
  string payload = 3; // JSON string
}

message CopilotStreamChunk {
  // Incremental text token.
  string token = 1;
  // True when this is the final chunk (includes full metadata).
  bool done = 2;
  // Populated only on the final chunk.
  CopilotAskResponse final_response = 3;
}

// ─── SubmitAction ──────────────────────────────────────────────────────────────

message SubmitActionRequest {
  TenantContext tenant = 1;
  string source_model = 2;
  string action_type = 3;   // e.g. "run_script", "create_ticket"
  string summary = 4;
  string details_json = 5;  // JSON-encoded details payload
  string target_type = 6;   // e.g. "device", "ticket" (optional)
  string target_id = 7;     // UUID of target entity (optional)
  RiskLevel risk_level = 8;
  string proposed_by = 9;   // user_id of the human proposing (optional)
}

enum RiskLevel {
  RISK_LEVEL_UNSPECIFIED = 0;
  RISK_LEVEL_LOW = 1;
  RISK_LEVEL_MEDIUM = 2;
  RISK_LEVEL_HIGH = 3;
  RISK_LEVEL_CRITICAL = 4;
}

message SubmitActionResponse {
  string action_id = 1;
  ActionStatus status = 2;
}

// ─── GetActionStatus ───────────────────────────────────────────────────────────

message GetActionStatusRequest {
  TenantContext tenant = 1;
  string action_id = 2;
}

enum ActionStatus {
  ACTION_STATUS_UNSPECIFIED = 0;
  ACTION_STATUS_PENDING = 1;
  ACTION_STATUS_APPROVED = 2;
  ACTION_STATUS_REJECTED = 3;
  ACTION_STATUS_EXECUTED = 4;
  ACTION_STATUS_EXPIRED = 5;
}

message ActionStatusResponse {
  string action_id = 1;
  ActionStatus status = 2;
  string reviewed_by = 3;
  string review_comment = 4;
  string executed_at = 5; // RFC3339 (empty if not executed)
}

// ─── EdgeSummarize ─────────────────────────────────────────────────────────────

message EdgeSummarizeRequest {
  TenantContext tenant = 1;
  string text = 2;
  int32 max_length = 3; // max summary length in tokens
}

message EdgeSummarizeResponse {
  string summary = 1;
  string model_used = 2;
}

// ─── IndexDomainKnowledge ──────────────────────────────────────────────────────

message IndexDomainKnowledgeRequest {
  TenantContext tenant = 1;
  // Type of knowledge being indexed.
  KnowledgeType knowledge_type = 2;
  // Documents to index (chunked by caller).
  repeated KnowledgeDocument documents = 3;
}

enum KnowledgeType {
  KNOWLEDGE_TYPE_UNSPECIFIED = 0;
  KNOWLEDGE_TYPE_DEVICE_DOC = 1;
  KNOWLEDGE_TYPE_PATCH_CATALOG = 2;
  KNOWLEDGE_TYPE_KB_ARTICLE = 3;
  KNOWLEDGE_TYPE_SECURITY_ADVISORY = 4;
  KNOWLEDGE_TYPE_RUNBOOK = 5;
  KNOWLEDGE_TYPE_TICKET_HISTORY = 6;
  KNOWLEDGE_TYPE_MONITORING_DATA = 7;
}

message KnowledgeDocument {
  // Unique identifier for deduplication.
  string document_id = 1;
  string title = 2;
  string content = 3;
  // Metadata for filtering during retrieval.
  map<string, string> metadata = 4;
  // RFC3339 timestamp of last modification.
  string updated_at = 5;
}

message IndexDomainKnowledgeResponse {
  int32 documents_indexed = 1;
  int32 documents_skipped = 2; // already up-to-date
  repeated string errors = 3;
}

// ─── RunbookSuggest ────────────────────────────────────────────────────────────

message RunbookSuggestRequest {
  TenantContext tenant = 1;
  string alert_type = 2;             // e.g. "cpu_high", "disk_full"
  string alert_severity = 3;         // critical, high, medium, low
  string alert_description = 4;      // free-text from the alert
  repeated string device_context = 5; // optional device metadata
}

message RunbookSuggestResponse {
  repeated RunbookSuggestion suggestions = 1;
}

message RunbookSuggestion {
  string runbook_id = 1;
  string runbook_name = 2;
  string summary = 3;
  double confidence = 4; // 0.0-1.0
  string reasoning = 5;  // why this runbook was selected
}

// ─── HealthCheck ───────────────────────────────────────────────────────────────

message HealthCheckRequest {
  TenantContext tenant = 1;
}

message HealthCheckResponse {
  ServiceHealth overall = 1;
  ServiceHealth llm_provider = 2;
  ServiceHealth rag_pipeline = 3;
  ServiceHealth vector_store = 4;
}

enum ServiceHealth {
  SERVICE_HEALTH_UNSPECIFIED = 0;
  SERVICE_HEALTH_HEALTHY = 1;
  SERVICE_HEALTH_DEGRADED = 2;
  SERVICE_HEALTH_UNHEALTHY = 3;
}
