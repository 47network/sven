      - MATRIX_ALLOWED_ROOM_IDS=${MATRIX_ALLOWED_ROOM_IDS}
      - MATRIX_TRIGGER_PREFIX=${MATRIX_TRIGGER_PREFIX:-/sven}
      - MATRIX_SYNC_MS=${MATRIX_SYNC_MS:-1500}
      - MATRIX_E2EE_ENABLED=${MATRIX_E2EE_ENABLED:-false}
      - MATRIX_REACTION_APPROVAL_PREFIX=${MATRIX_REACTION_APPROVAL_PREFIX:-approval:}
      - OUTBOX_POLL_INTERVAL=${OUTBOX_POLL_INTERVAL:-2000}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - core
    depends_on:
      gateway-api:
        condition: service_healthy
    logging: *default-logging

  # ── Zalo Adapter ───────────────────────────────────────────────────
  adapter-zalo:
    profiles: [ "adapters", "zalo" ]
    build:
      context: .
      dockerfile: services/adapter-zalo/Dockerfile
    restart: unless-stopped
    environment:
      - ADAPTER_CHANNEL=zalo
      - GATEWAY_URL=http://gateway-api:${GATEWAY_PORT:-3000}
      - SVEN_ADAPTER_TOKEN=${SVEN_ADAPTER_TOKEN}
      - ZALO_ACCESS_TOKEN=${ZALO_ACCESS_TOKEN}
      - ZALO_WEBHOOK_SECRET=${ZALO_WEBHOOK_SECRET}
      - ZALO_API_BASE=${ZALO_API_BASE:-https://openapi.zalo.me/v3.0/oa}
      - ZALO_PORT=${ZALO_PORT:-8484}
      - OUTBOX_POLL_INTERVAL=${OUTBOX_POLL_INTERVAL:-2000}
      - NODE_ENV=${NODE_ENV:-production}
