      - "${ZALO_PORT:-8484}:8484"
    networks:
      - core
      - tools
    depends_on:
      gateway-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://127.0.0.1:8484/healthz', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ── Zalo Personal Adapter ──────────────────────────────────────────
  adapter-zalo-personal:
    profiles: [ "adapters", "zalo-personal" ]
