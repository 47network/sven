# ─────────────────────────────────────────────────────────────────────────────
# Sven v0.1.0 – Production Compose Stack
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  # ── Postgres (pgvector) ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=60s
      - -c
      - "archive_command=test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgwalarchive:/var/lib/postgresql/wal_archive
    ports:
      - "${SVEN_EXPOSE_POSTGRES_PORT:-127.0.0.1:5432:5432}"
    networks:
      - core
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  # ── Postgres Maintenance (VACUUM/ANALYZE scheduler) ─────────────────────
  postgres-maintenance:
    image: pgvector/pgvector@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_MAINTENANCE_INTERVAL_SECONDS: ${POSTGRES_MAINTENANCE_INTERVAL_SECONDS:-86400}
      POSTGRES_MAINTENANCE_INITIAL_DELAY_SECONDS: ${POSTGRES_MAINTENANCE_INITIAL_DELAY_SECONDS:-300}
    command:
      - /bin/sh
      - -lc
      - |
        sleep "${POSTGRES_MAINTENANCE_INITIAL_DELAY_SECONDS}";
        while true; do
          vacuumdb -h postgres -U "${POSTGRES_USER}" --all --analyze-in-stages --jobs=2;
          sleep "${POSTGRES_MAINTENANCE_INTERVAL_SECONDS}";
        done
    networks:
      - core
    logging: *default-logging

  # ── NATS (JetStream) ────────────────────────────────────────────────────
  nats:
    image: nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    restart: unless-stopped
    command: >
      --jetstream --store_dir /data --http_port 8222
    volumes:
      - natsdata:/data
    ports:
      - "${SVEN_EXPOSE_NATS_CLIENT_PORT:-127.0.0.1:4222:4222}"
      - "${SVEN_EXPOSE_NATS_MONITORING_PORT:-127.0.0.1:8222:8222}"
    networks:
      - core
      - tools
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging

  # ── Egress Proxy (HTTP forward proxy) ────────────────────────────────
  egress-proxy:
    image: ubuntu/squid@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029
    restart: unless-stopped
    volumes:
      - ./services/egress-proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./services/egress-proxy/allowlist.txt:/etc/squid/allowlist.txt:ro
    networks:
      - tools
    logging: *default-logging

  # ── SearXNG (Private Search Engine) ──────────────────────────────
  searxng:
    image: searxng/searxng@sha256:c5e5aedb70ec4b7ff5b1e8f8ea69253dceb85a98b8757360c1b65fe8652d6066
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?SEARXNG_SECRET is required}
    volumes:
      - ./services/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
    networks:
      - tools
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ── OpenSearch ───────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch@sha256:645d3d9390ade7ebef988d3c9bc61a6616f1863ff41efe97e2347d6bf7972504
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=${OPENSEARCH_DISABLE_SECURITY:-false}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - osdata:/usr/share/opensearch/data
    ports:
      - "${SVEN_EXPOSE_OPENSEARCH_PORT:-127.0.0.1:9200:9200}"
    networks:
      - rag
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ── Ollama (LLM) ─────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama@sha256:0ff452f6a4c3c5bb4ab063a1db190b261d5834741a519189ed5301d50e4434d1
    restart: unless-stopped
    ports:
      - "${SVEN_EXPOSE_OLLAMA_PORT:-127.0.0.1:11434:11434}"
    volumes:
      - ollama:/root/.ollama
    networks:
      - core
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: [ "CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ── LiteLLM Proxy (Multi-Provider LLM Gateway) ──────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm@sha256:9c1f1889774a973ce650f712ace6753a9b6dd1182d25d837b858dbcac6ea3056
    restart: unless-stopped
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    networks:
      - core
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    profiles:
      - litellm
    logging: *default-logging

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  Monitoring Stack (OpenTelemetry + Prometheus + Grafana)               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  # ── OpenTelemetry Collector ─────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib@sha256:f6e429c1052ab50f85a7afa5f7e32f25931697751622b0e1f453d10f79a1df3c
    restart: unless-stopped
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      - GOGC=80
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8890:8888" # Prometheus metrics
      - "8891:8889" # OTLP metrics exporter
    networks:
      - core
      - monitoring
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:13133/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus-data:/prometheus
    environment:
      - TZ=Europe/Bucharest
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - core
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana@sha256:9e1e77ade304069aee3196e9a4f210830e96e80ce9a2640891eccc324b152faf
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Europe/Bucharest
      - TZ=Europe/Bucharest
    ports:
      - "9091:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Loki (optional, enable with --profile monitoring-logs) ────────────────
  loki:
    profiles: [ "monitoring-logs" ]
    image: grafana/loki@sha256:8b5bd7748d0e4da66cd741ac276e485517514af0bea32167e27c0e1a95bcf8aa
    restart: unless-stopped
    command: [ "-config.file=/etc/loki/local-config.yml", "-config.expand-env=true" ]
    environment:
      - LOKI_HOT_RETENTION_PERIOD=${LOKI_HOT_RETENTION_PERIOD:-720h}
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - monitoring
    logging: *default-logging

  # ── Promtail (optional, ships docker logs to Loki) ────────────────────────
  promtail:
    profiles: [ "monitoring-logs" ]
    image: grafana/promtail@sha256:45d54f0ebd7a19acbcd4693a3227d84d27d98abe1dc7ea3068d31d5d02dbe696
    restart: unless-stopped
    command: [ "-config.file=/etc/promtail/config.yml" ]
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - monitoring
    depends_on:
      loki:
        condition: service_started
    logging: *default-logging

  # ── Gateway API ──────────────────────────────────────────────────────────
  gateway-api:
    build:
      context: .
      dockerfile: services/gateway-api/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NATS_URL=${NATS_URL}
      - GATEWAY_PORT=${GATEWAY_PORT:-3000}
      - GATEWAY_HOST=0.0.0.0
      - OPENSEARCH_URL=${OPENSEARCH_URL}
      - OPENSEARCH_USER=${OPENSEARCH_USER}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - EMBEDDINGS_ENABLED=${EMBEDDINGS_ENABLED}
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER}
      - EMBEDDINGS_URL=${EMBEDDINGS_URL}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL}
      - EMBEDDINGS_DIM=${EMBEDDINGS_DIM}
      - OLLAMA_URL=${OLLAMA_URL}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - SVEN_ADAPTER_TOKEN=${SVEN_ADAPTER_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - GATEWAY_TAILSCALE_MODE=${GATEWAY_TAILSCALE_MODE:-off}
      - TAILSCALE_BIN=${TAILSCALE_BIN:-tailscale}
      - TAILSCALE_CMD_TIMEOUT_MS=${TAILSCALE_CMD_TIMEOUT_MS:-15000}
      - GATEWAY_TAILSCALE_RESET_ON_SHUTDOWN=${GATEWAY_TAILSCALE_RESET_ON_SHUTDOWN:-true}
      - STREAM_RESUME_TTL_MS=${STREAM_RESUME_TTL_MS:-120000}
      - STREAM_RESUME_MAX_EVENTS=${STREAM_RESUME_MAX_EVENTS:-500}
      - STREAM_RESUME_CLEANUP_MS=${STREAM_RESUME_CLEANUP_MS:-30000}
      - GMAIL_PUBSUB_TOKEN=${GMAIL_PUBSUB_TOKEN}
      - GMAIL_ACCESS_TOKEN=${GMAIL_ACCESS_TOKEN}
      - GMAIL_ACCESS_TOKEN_REF=${GMAIL_ACCESS_TOKEN_REF}
      - NODE_ENV=${NODE_ENV:-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-47}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SVEN_MIGRATION_SKIP_INCOMPATIBLE=${SVEN_MIGRATION_SKIP_INCOMPATIBLE:-false}
      - SVEN_MIGRATION_ID_MODE=${SVEN_MIGRATION_ID_MODE:-text}
      - SVEN_EDGE_ADMIN47_SYNC_ENABLED=${SVEN_EDGE_ADMIN47_SYNC_ENABLED:-false}
      - SVEN_EDGE_ADMIN47_ACCESS_DIR=${SVEN_EDGE_ADMIN47_ACCESS_DIR:-/etc/nginx/conf.d/sven-admin47-access}
      - SVEN_EDGE_ADMIN47_ACCESS_FILE=${SVEN_EDGE_ADMIN47_ACCESS_FILE:-allowlist.conf}
      - SVEN_EDGE_NGINX_TEST_CMD=${SVEN_EDGE_NGINX_TEST_CMD:-nginx -t}
      - SVEN_EDGE_NGINX_RELOAD_CMD=${SVEN_EDGE_NGINX_RELOAD_CMD:-systemctl reload nginx}
      - SVEN_TUNNEL_PROVIDER=${SVEN_TUNNEL_PROVIDER:-cloudflare}
      - SVEN_TUNNEL_PUBLIC_URL=${SVEN_TUNNEL_PUBLIC_URL:-}
      - SVEN_TUNNEL_LOG_FILE=${SVEN_TUNNEL_LOG_FILE:-/var/run/sven-tunnel/cloudflared.log}
      - SVEN_TUNNEL_URL_FILE=${SVEN_TUNNEL_URL_FILE:-/var/run/sven-tunnel/tunnel-url.txt}
      - SVEN_INTEGRATION_RUNTIME_EXEC_ENABLED=${SVEN_INTEGRATION_RUNTIME_EXEC_ENABLED:-false}
      - SVEN_INTEGRATION_DEPLOY_CMD_TEMPLATE=${SVEN_INTEGRATION_DEPLOY_CMD_TEMPLATE:-}
      - SVEN_INTEGRATION_STOP_CMD_TEMPLATE=${SVEN_INTEGRATION_STOP_CMD_TEMPLATE:-}
      - SVEN_INTEGRATION_STATUS_CMD_TEMPLATE=${SVEN_INTEGRATION_STATUS_CMD_TEMPLATE:-}
      - SVEN_INTEGRATION_RUNTIME_RECONCILE_ENABLED=${SVEN_INTEGRATION_RUNTIME_RECONCILE_ENABLED:-false}
      - SVEN_INTEGRATION_RUNTIME_RECONCILE_INTERVAL_MS=${SVEN_INTEGRATION_RUNTIME_RECONCILE_INTERVAL_MS:-60000}
      - SVEN_INTEGRATION_RUNTIME_AUTOHEAL=${SVEN_INTEGRATION_RUNTIME_AUTOHEAL:-false}
      - SVEN_COMMUNITY_DOCS_URL=${SVEN_COMMUNITY_DOCS_URL:-}
      - SVEN_COMMUNITY_DISCORD_URL=${SVEN_COMMUNITY_DISCORD_URL:-}
      - SVEN_COMMUNITY_GITHUB_DISCUSSIONS_URL=${SVEN_COMMUNITY_GITHUB_DISCUSSIONS_URL:-}
      - SVEN_COMMUNITY_MARKETPLACE_URL=${SVEN_COMMUNITY_MARKETPLACE_URL:-}
      - SVEN_COMMUNITY_ACCESS_MODE=${SVEN_COMMUNITY_ACCESS_MODE:-verified_persona_only}
      - SVEN_COMMUNITY_PERSONA_PROVIDER=${SVEN_COMMUNITY_PERSONA_PROVIDER:-}
      - SVEN_COMMUNITY_PERSONA_ALLOWLIST=${SVEN_COMMUNITY_PERSONA_ALLOWLIST:-}
      - SVEN_COMMUNITY_MODERATION_MODE=${SVEN_COMMUNITY_MODERATION_MODE:-strict}
      - SVEN_COMMUNITY_AGENT_POST_POLICY=${SVEN_COMMUNITY_AGENT_POST_POLICY:-reviewed_only}
      - SVEN_COMMUNITY_SECURITY_BASELINE_SIGNED=${SVEN_COMMUNITY_SECURITY_BASELINE_SIGNED:-false}
      - COMMUNITY_DATABASE_URL=${COMMUNITY_DATABASE_URL:-}
      - COMMUNITY_ACCOUNTS_TABLE=${COMMUNITY_ACCOUNTS_TABLE:-community_accounts}
      - COMMUNITY_ACCOUNTS_ACCOUNT_ID_COL=${COMMUNITY_ACCOUNTS_ACCOUNT_ID_COL:-account_id}
      - COMMUNITY_ACCOUNTS_HANDLE_COL=${COMMUNITY_ACCOUNTS_HANDLE_COL:-handle}
      - COMMUNITY_ACCOUNTS_REPUTATION_COL=${COMMUNITY_ACCOUNTS_REPUTATION_COL:-reputation}
      - COMMUNITY_ACCOUNTS_VERIFIED_COL=${COMMUNITY_ACCOUNTS_VERIFIED_COL:-verified}
      - COMMUNITY_ACCOUNTS_CREATED_AT_COL=${COMMUNITY_ACCOUNTS_CREATED_AT_COL:-created_at}
      - COMMUNITY_ACCESS_REQUESTS_TABLE=${COMMUNITY_ACCESS_REQUESTS_TABLE:-community_access_requests}
      - SVEN_COMMUNITY_FEED_ROOT=${SVEN_COMMUNITY_FEED_ROOT:-/app}
      - GATEWAY_URL=${GATEWAY_URL:-}
      - SVEN_PUBLIC_URL=${SVEN_PUBLIC_URL:-}
      - SVEN_EXTENSION_API_KEY=${SVEN_EXTENSION_API_KEY:-sven-ext-47-dev}
      - SVEN_PAPER_TRADE_MODE=${SVEN_PAPER_TRADE_MODE:-true}
      - SVEN_INSTANCE_NAME=${SVEN_INSTANCE_NAME:-Sven}
      - SVEN_DISABLE_REGISTRATION=${SVEN_DISABLE_REGISTRATION:-}
      - SVEN_SSO_PROVIDERS=${SVEN_SSO_PROVIDERS:-}
    volumes:
      - tunnel-data:/var/run/sven-tunnel:ro
      - ./docs/community:/app/docs/community:ro
      - ./docs/release/status:/app/docs/release/status:ro
    ports:
      - "${GATEWAY_PORT:-3000}:${GATEWAY_PORT:-3000}"
    networks:
      - core
      - tools
      - rag
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://localhost:${GATEWAY_PORT:-3000}/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ── Sven Internal Ingress (Dockerized nginx) ───────────────────────────
  sven-internal-nginx:
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./deploy/quickstart:/usr/share/nginx/html:ro
      - ./config/nginx/sven-internal-ingress.docker.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - core
      - tools
    depends_on:
      gateway-api:
        condition: service_healthy
    logging: *default-logging

  # ── Legacy quickstart-static (disabled by default) ─────────────────────
  quickstart-static:
    profiles: [ "legacy-ingress" ]
    image: nginx@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    restart: unless-stopped
    ports:
      - "18088:80"
    volumes:
      - ./deploy/quickstart:/usr/share/nginx/html:ro
      - ./config/nginx/quickstart-static.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tools
    logging: *default-logging

  # ── Agent Runtime ───────────────────────────────────────────────────────
  agent-runtime:
    build:
      context: .
      dockerfile: services/agent-runtime/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NATS_URL=${NATS_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - core
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    logging: *default-logging

  # ── Skill Runner ─────────────────────────────────────────────────────
  skill-runner:
    build:
      context: .
      dockerfile: services/skill-runner/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_READ_URL=${DATABASE_READ_URL}
      - PG_POOL_MIN=${PG_POOL_MIN:-5}
      - PG_POOL_MAX=${PG_POOL_MAX:-20}
      - PG_POOL_CONNECTION_TIMEOUT_MS=${PG_POOL_CONNECTION_TIMEOUT_MS:-5000}
      - PG_POOL_IDLE_TIMEOUT_MS=${PG_POOL_IDLE_TIMEOUT_MS:-60000}
      - PG_STATEMENT_TIMEOUT_MS=${PG_STATEMENT_TIMEOUT_MS:-30000}
      - PG_REPORT_STATEMENT_TIMEOUT_MS=${PG_REPORT_STATEMENT_TIMEOUT_MS:-120000}
      - PG_READ_POOL_MIN=${PG_READ_POOL_MIN:-5}
      - PG_READ_POOL_MAX=${PG_READ_POOL_MAX:-20}
      - PG_READ_POOL_CONNECTION_TIMEOUT_MS=${PG_READ_POOL_CONNECTION_TIMEOUT_MS:-5000}
      - PG_READ_POOL_IDLE_TIMEOUT_MS=${PG_READ_POOL_IDLE_TIMEOUT_MS:-60000}
      - PG_READ_STATEMENT_TIMEOUT_MS=${PG_READ_STATEMENT_TIMEOUT_MS:-30000}
      - PRIVACY_RETENTION_CLEANUP_INTERVAL_MS=${PRIVACY_RETENTION_CLEANUP_INTERVAL_MS:-86400000}
      - PRIVACY_RETENTION_CLEANUP_INITIAL_DELAY_MS=${PRIVACY_RETENTION_CLEANUP_INITIAL_DELAY_MS:-120000}
      - NATS_URL=${NATS_URL}
      - NODE_ENV=${NODE_ENV:-production}
      - SVEN_DYNAMIC_SKILLS_DIR=/opt/sven/registry
      - SVEN_EGRESS_PROXY=${SVEN_EGRESS_PROXY}
      - SVEN_EGRESS_NETWORK=${SVEN_EGRESS_NETWORK}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - HA_BASE_URL=${HA_BASE_URL}
      - HA_TOKEN=${HA_TOKEN}
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - SVEN_SOPS_BIN=${SVEN_SOPS_BIN}
      # ── AI subscription credentials (aider / gemini-cli skills) ──────────
      # GitHub Copilot: the OAuth token VS Code/JetBrains write after sign-in.
      # Either mount the creds file (preferred) OR set the token directly.
      - GITHUB_COPILOT_TOKEN=${GITHUB_COPILOT_TOKEN:-}
      - AIDER_COPILOT_MODEL=${AIDER_COPILOT_MODEL:-openai/claude-opus-4}
      # Gemini: only needed if not mounting oauth_creds.json below
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Workspace root that aider / gemini-cli skills default to
      - SKILL_WORKSPACE=${SKILL_WORKSPACE:-/workspace}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./skills:/opt/sven/registry:ro
      # ── Mount IDE OAuth credential files (read-only) ─────────────────────
      # These are written automatically when you sign into Copilot / Gemini
      # in VS Code or JetBrains. No separate API key needed — Sven uses the
      # same subscription tokens you already have.
      #
      # Linux / macOS host path: ~/.config/github-copilot/apps.json
      # Run: docker compose config  to verify the host path resolves.
      - ${COPILOT_CREDS_DIR:-${HOME}/.config/github-copilot}:/root/.config/github-copilot:ro
      # Gemini CLI OAuth creds (run `gemini` once interactively to create)
      - ${GEMINI_CREDS_DIR:-${HOME}/.gemini}:/root/.gemini:ro
      # ── Persistent Chromium profile for browser-use skill ────────────────
      # Stores cookies/sessions from a ONE-TIME login (Google, Whisk, Flow, etc.)
      # Setup: docker volume create sven-browser-profile
      #        docker run --rm -it -v sven-browser-profile:/browser-profile \
      #          -p 5900:5900 ghcr.io/browserless/chrome:latest  (or local Chrome)
      #        → log into Google → close browser → done forever
      - sven-browser-profile:/browser-profile
    networks:
      - core
      - tools
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      egress-proxy:
        condition: service_started
    logging: *default-logging

