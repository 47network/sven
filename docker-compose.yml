  # ── Nextcloud Talk Adapter ───────────────────────────────────────────
  adapter-nextcloud-talk:
    profiles: [ "adapters", "nextcloud-talk" ]
    build:
      context: .
      dockerfile: services/adapter-nextcloud-talk/Dockerfile
    restart: unless-stopped
    environment:
      - ADAPTER_CHANNEL=nextcloud_talk
      - GATEWAY_URL=http://gateway-api:${GATEWAY_PORT:-3000}
      - SVEN_ADAPTER_TOKEN=${SVEN_ADAPTER_TOKEN}
      - NEXTCLOUD_BASE_URL=${NEXTCLOUD_BASE_URL}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER}
      - NEXTCLOUD_APP_PASSWORD=${NEXTCLOUD_APP_PASSWORD}
      - NEXTCLOUD_WEBHOOK_TOKEN=${NEXTCLOUD_WEBHOOK_TOKEN}
      - NEXTCLOUD_TALK_PORT=${NEXTCLOUD_TALK_PORT:-8495}
      - OUTBOX_POLL_INTERVAL=${OUTBOX_POLL_INTERVAL:-2000}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "${NEXTCLOUD_TALK_PORT:-8495}:8495"
    networks:
      - core
      - tools
    depends_on:
      gateway-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://127.0.0.1:8495/healthz', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ── Mirror Agent (Smart Mirror / Kiosk / Sensor Hub) ─────────────────
  sven-mirror-agent:
    profiles: [ "mirror" ]
    build:
      context: .
      dockerfile: services/sven-mirror-agent/Dockerfile
    restart: unless-stopped
    environment:
      - SVEN_GATEWAY_URL=http://gateway-api:${GATEWAY_PORT:-3000}
      - SVEN_DEVICE_NAME=${MIRROR_DEVICE_NAME:-Docker Mirror}
      - SVEN_DEVICE_TYPE=${MIRROR_DEVICE_TYPE:-mirror}
      - SVEN_API_KEY=${MIRROR_API_KEY}
      - SVEN_DISPLAY_ENABLED=${MIRROR_DISPLAY_ENABLED:-false}
      - SVEN_CAMERA_ENABLED=${MIRROR_CAMERA_ENABLED:-false}
      - SVEN_AUDIO_ENABLED=${MIRROR_AUDIO_ENABLED:-false}
      - SVEN_SENSOR_ENABLED=${MIRROR_SENSOR_ENABLED:-false}
    volumes:
      - mirror-agent-data:/data
    networks:
      - core
    depends_on:
      gateway-api:
        condition: service_healthy
    logging: *default-logging

networks:
  core:
    name: sven-core
    driver: bridge
  tools:
    name: sven-tools
    driver: bridge
  rag:
    name: sven-rag
    driver: bridge
  monitoring:
    name: sven-monitoring
    driver: bridge

volumes:
  pgdata:
    name: sven-pgdata
  pgwalarchive:
    name: sven-pgwalarchive
  natsdata:
    name: sven-natsdata
  osdata:
    name: sven-osdata
  sven-browser-profile:
    name: sven-browser-profile
    # One-time login: see docs/integrations/ai-provider-subscriptions.md §7
  gitdata:
    name: sven-gitdata
  ollama:
    name: sven-ollama
  prometheus-data:
    name: sven-prometheus-data
  grafana-data:
    name: sven-grafana-data
  loki-data:
    name: sven-loki-data
  loki-archive:
    name: sven-loki-archive
  mirror-agent-data:
    name: sven-mirror-agent-data
  searxng-data:
    name: sven-searxng-data
  tunnel-data:
    name: sven-tunnel-data
  zalo-personal-data:
    name: sven-zalo-personal-data
  whatsapp-personal-sessions:
    name: sven-whatsapp-personal-sessions
