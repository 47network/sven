    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --metrics
      - 0.0.0.0:2000
      - --loglevel
      - info
      - --logfile
      - /var/run/sven-tunnel/cloudflared.log
      - --url
      - http://sven-internal-nginx:80
    volumes:
      - tunnel-data:/var/run/sven-tunnel
