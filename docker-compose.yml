  # ── Telegram Adapter ────────────────────────────────────────────────
  adapter-telegram:
    profiles: [ "adapters", "telegram" ]
    build:
      context: .
      dockerfile: services/adapter-telegram/Dockerfile
    restart: unless-stopped
    environment:
